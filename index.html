<style>

<script>
const DATA = [
{cat:"Morning",title:"Morning Routine: Woodland Drive",subs:[
{h:"How to Use This Section",content:`<p>This is your start-of-day walkthrough for the <b>333 Woodland Drive</b> depot, in the order you actually do things: arrive → sort mail → parcels → Neighbourhood Mail → load vehicle → PDT → out the door. It follows the official <b>Inside Duties (Steps 1–28)</b> sequence from the Participant Guide (Appendices, pages 177–181).</p>
<p><span class="depot-badge">STEP VAN · WAVE 2</span> Written for your <b>motorized</b> route. Foot-route differences are noted only where they matter.</p>
<p>Two things to watch for as you read:</p>
<div class="lcd lcd1"><span class="lcd-label">LCD 1 · High-rise / Downtown core</span><div>West End, Yaletown, Coal Harbour, Downtown business district. Apartment panels, concierge drops, corporate mailrooms, heavy parcel volume.</div></div>
<div class="lcd lcd2"><span class="lcd-label">LCD 2 · Historic core / East Downtown</span><div>Gastown, Chinatown, DTES, Strathcona. Storefronts, SRO hotels, social housing, secure mail slots, community mailrooms. Street-level situational awareness matters.</div></div>
<div class="warn">You haven't started at Woodland yet. Anything in an <span class="fillin">amber blank</span> is something to confirm on-site. Green <b>"Ask at the depot"</b> boxes list specific questions for your supervisor or an experienced carrier.</div>`},

{h:"1. Arrive & Get Oriented",content:`<p>First thing on the floor: figure out your assignment and study your route before you touch any mail.</p>
<ol class="steps">
<li><b>Check the assignment board / whiteboard.</b> If you're newly assigned to a route, confirm your draw with the supervisor or the depot information board. <span class="fillin">Your route: ____ · Wave 2 start time: ____</span></li>
<li><b>Find your route's A-62 sortation case</b> and review the <b>header board</b> first. It confirms relay box, SLB and CMB locations, required corporate keys, street distribution, and special instructions. (See the <i>Reading the Header Board</i> section.)</li>
<li><b>Scope the route structure:</b> look for any Directs, Callers, and relay support. Review the AM and PM route map.</li>
<li><b>Adjust the case</b> to your height for proper ergonomics, and flip the case strips to your route if required.</li>
</ol>
<div class="ask"><div class="ask-label">📋 Ask at the depot</div><ul>
<li>Where is my assigned <b>supply area / draw area</b>, and where do I find the depot cart for my route?</li>
<li>How is the floor laid out, and where do I draw mail, parcels, and NM? (The depot doc flags Woodland's layout as something to learn during walk-throughs.)</li>
<li>What's my exact <b>Wave 2</b> departure time, and how much lead time do I realistically have?</li>
<li>Anything special about this route I should know? (Guide Step 26 literally says to ask this.) Get the supervisors' names and the depot phone number(s).</li>
</ul></div>`},

{h:"2. Organize Your Mail (Sorting)",content:`<p>Pull your mail and sort it into the case. Load the depot cart <b>bottom to top</b>.</p>
<ol class="steps">
<li>Using a C-48 cart, retrieve your route's <b>(1) manual mail</b> and <b>(2) packets</b> from the depot cart at the end of the aisle. (Foot route also grabs sequenced mail here.)</li>
<li><b>Redirection / Hold Mail case cards</b> (yellow sleeves): sort into the case if needed. Verify expiry dates; remove expired ones per local procedure.</li>
<li><b>Sort manual Standard (STD) Lettermail</b> into the case.</li>
<li><b>Sort all Oversized (OS) mail</b> into the case.</li>
<li>Verify all packets and documents are for <b>YOUR</b> route. Do <b>not</b> card items in the depot unless they're Card-For-Pickup items.</li>
<li>For any item too awkward to fit a separation, turn the last envelope for that POC backwards as a flag. Hint: write the tie-out number on the item.</li>
</ol>
<p>Detail on case work and sequencing is in the <i>Sorting &amp; Case Work</i> section.</p>
<div class="lcd lcd1"><span class="lcd-label">LCD 1 · High-rise</span><div>High-rise routes carry a lot of <b>apartment-panel</b> mail. Expect heavy bundles per POC, so mind your tie-out so a single tower's mail stays together and in order.</div></div>
<div class="lcd lcd2"><span class="lcd-label">LCD 2 · DTES / storefronts</span><div>Mixed delivery points: storefronts, SRO front desks, social-housing mailrooms. Watch for POCs that are businesses vs. residential within the same block.</div></div>`},

{h:"3. Organize Your Parcels",content:`<p>Confirm your parcels, scan them, and get them ready to load in delivery sequence. <b>Always refer to the header board to determine the delivery sequence for each parcel.</b></p>
<ol class="steps">
<li><b>Itinerary / OFD confirmation:</b> verify and confirm the barcoded items on the PDT against the parcels in your possession. Download and confirm Customer Lists.</li>
<li>If desired, <b>clear and rescan</b> all barcoded items Out For Delivery (OFD).</li>
<li>Move manually sorted mail to the <b>Consolidation Area</b> with a C-48; transfer to your route's depot cart.</li>
<li><b>Verify all parcels are for YOUR route.</b> Note any parcels for POCs that may need Hold Mail or Redirection.</li>
<li>Confirm the parcels scanned to the PDT. (If you did a clear-and-rescan, scan all parcels OFD.)</li>
</ol>
<div class="lcd lcd1"><span class="lcd-label">LCD 1 · High-rise</span><div>Expect <b>high parcel volume</b>. Plan how you'll consolidate parcels by tower / concierge so you're not making repeat trips into the same building.</div></div>
<div class="lcd lcd2"><span class="lcd-label">LCD 2 · DTES / SRO</span><div>Many parcels go to <b>SRO front desks or storefronts</b> rather than individual doors. Sequence them by building entrance.</div></div>
<div class="ask"><div class="ask-label">📋 Ask at the depot</div><ul>
<li>Where exactly is the <b>parcel staging area</b> and the Consolidation Area for my route?</li>
<li>How are oversize / heavy parcels handled here, and is there separate staging?</li>
<li>For high-rises with a concierge: do parcels get bulk-dropped at the desk, or door-by-door? Is there a building list?</li>
</ul></div>`},

{h:"4. Neighbourhood Mail (NM)",content:`<p>Get the right colour day's NM and prep it. Woodland uses an <b>Admail Control Board</b>; each mailing has a <b>Delivery Control Slip (DCS)</b>.</p>
<ol class="steps">
<li>Retrieve your route's NM for that day's designated delivery per the Admail Control Board and each mailing's DCS.</li>
<li>Organize the NM storage area into the colour <b>splits</b> (pink, orange, blue). 3-day splits show by colour on the case strip and header board; 4-day splits are on the header board.</li>
<li><b>Prepare NM:</b> 1–2 sets for central delivery → bundle into pure piles. 3+ sets → collate per POC and combine at tie-out, or sort individually into the case.</li>
<li><b>Determine coverage</b> (which thirds you deliver today) and always deliver per the DCS: designated FSA(s), Houses, Apts., Businesses, Farms.</li>
<li><b>Scan the DCS barcode:</b> BL = Blue, PI = Pink, OR = Orange. Delivering extra days requires supervisor approval (no overtime).</li>
</ol>
<p>More in the <i>Neighbourhood Mail</i> section.</p>
<div class="lcd lcd1"><span class="lcd-label">LCD 1 · High-rise</span><div>For apartments/businesses, follow the DCS exactly. Some towers or commercial POCs may be flagged differently for NM.</div></div>
<div class="ask"><div class="ask-label">📋 Ask at the depot</div><ul>
<li>Where is the <b>NM bunker / Admail Control Board</b> for my route?</li>
<li>What colour day is "today" for my route, and how do I read my split off the header board?</li>
</ul></div>`},

{h:"5. Tie Out & Revise the Case",content:`<p>Pull the mail from the case in delivery order and bundle it (tying out), then pull the items that don't go on the truck.</p>
<ol class="steps">
<li><b>Get enough LFTs</b> to tie out the route (motorized). Foot route: get and tag relay bags per the header board.</li>
<li>Place an empty LFT on the case ledge. Follow the tie-out instructions and route sequence on the header board. Pull manual mail into manageable bundles, minding the <b>pink breaker bar</b> marks; wrap each with an elastic and place in the LFT.</li>
<li><b>Park &amp; Loop</b> stops: lay bundles flat. <b>Stop &amp; Go</b>: bundles upright with packets/documents behind. Repeat until the LFT is full, then move it to the C-48, bottom shelf first.</li>
<li><b>Revise the case.</b> Remove and set aside: Redirections (bundle with case card on top), Hold Mail (write Hold number on top piece), Callers, Directs, RTS/Undeliverable, Damaged. Place each in its designated area.</li>
<li>Leave any missorts you spot in the proper separation (e.g. lower right). Update the route's <b>Edit Book</b> with any changes.</li>
</ol>
<div class="warn">Hint: number your bundles / LFTs with tie-out numbers. It keeps you organized when loading the vehicle.</div>`},

{h:"6. Set Up & Load Your Vehicle",content:`<p>Grab your route kit, do your pre-trip, then load the Step Van in sequence.</p>
<ol class="steps">
<li><b>Retrieve and review the Route Kit.</b> Get: blank Items Delivered Bills (IDBs), vehicle logbook, keys and credit card, corporate keys (attach to yourself), enough route-specific Delivery Notice Cards, black pens.</li>
<li><b>Check your PPE / personal gear:</b> dual satchel, sunglasses, sunscreen, water, bug spray, dog spray or horn, anti-slip devices, rain/snow gear.</li>
<li>Take your depot cart to the vehicle. <b>Perform a pre-trip vehicle inspection (circle check)</b> before the shift. Enter mileage in the PDT (or logbook). Move the vehicle to the loading area.</li>
<li><b>Fasten your seatbelt before starting the vehicle.</b> Remove your satchel while wearing a seatbelt. Use <b>three points of contact</b> entering and exiting.</li>
</ol>
<h4>Loading the Step Van (front → back, in line of travel)</h4>
<ol class="steps">
<li>Load shelf items <b>front to back</b>, first stops at the front near the bulkhead.</li>
<li>Place <b>carded items behind the bulkhead</b> by call-for location.</li>
<li>Large/heavy items on the floor, <b>sequenced toward the rear door.</b></li>
<li>Empty SLB tubs (SO-95s) behind the bulkhead on the floor.</li>
<li>At each stop, shift remaining packages forward an arm's length and check them as you go. Plan ahead.</li>
<li>Keep the dolly / C-45 cart secured and within easy reach.</li>
</ol>
<div class="ask"><div class="ask-label">📋 Ask at the depot</div><ul>
<li>Which <b>vehicle</b> is mine, where is it parked, and where's the loading area at Woodland?</li>
<li>Walk me through the <b>pre-trip / circle check</b> for this Step Van the first time. What fails it?</li>
<li>Where do I log mileage and pick up the vehicle keys, logbook, and credit card?</li>
</ul></div>`},

{h:"7. PDT Final Checks Before You Leave",content:`<p>Before pulling out, make sure the PDT has everything it needs for the day. (Full device walkthrough is in the <i>PDT Device</i> section.)</p>
<ol class="steps">
<li><b>Obtain the PDT, log in, and confirm battery charge.</b> Acknowledge any messages on first log-in.</li>
<li><b>Download and verify Out for Delivery (OFD)</b> items. Confirm they match the parcels you loaded.</li>
<li><b>Verify ALL pickups, CMBs and SLBs are downloaded</b> to the PDT. Check for any <b>On-Demand pickups</b> and pay attention to closing times.</li>
<li>Ensure the PDT's <b>Jabber is connected</b> and the battery is adequate for the whole route.</li>
<li>Check for any <b>RPO supplies</b> to be delivered. Enter vehicle mileage if you haven't.</li>
</ol>
<div class="ask"><div class="ask-label">📋 Ask at the depot</div><ul>
<li>What's the normal <b>OFD download</b> flow here, and what do I do if a parcel won't confirm?</li>
<li>How do I check for and accept <b>On-Demand pickups</b> on my route?</li>
<li>Who do I call if the PDT won't log in or Jabber won't connect?</li>
</ul></div>`},

{h:"8. Prepare for Departure & Head Out",content:`<p>Final gate before the route. Once everything checks out, depart at your proper Wave 2 time.</p>
<ol class="steps">
<li><b>Ensure you have everything</b> before heading out: mail, parcels, NM, keys, PDT, route kit, PPE.</li>
<li>Confirm supervisors' names and the depot phone number(s) are on you.</li>
<li><b>Depart at the proper time</b> (your wave). Head <b>straight to the start of the route.</b></li>
<li>On route: deliver to each POC safely, accurately, in sequence. Perform the <b>Delivery scan on the PDT only at the POC.</b> Deliver NM per the DCS even if there's no other mail for that POC. Never discard surplus NM on route.</li>
</ol>
<div class="danger">If your depot's process differs from the guide, follow the depot's process, but know the standard so you can tell the difference.</div>`},

{h:"9. LCD 1: High-Rise, Mailrooms & Keys (skeleton)",content:`<div class="lcd lcd1"><span class="lcd-label">LCD 1 only · High-rise / Downtown</span><div>This is the workflow North Burnaby never gave you (your route there was all residential). Treat the steps below as a starting frame and fill it in once you've worked a tower.</div></div>
<p><b>What the training already tells you about keys:</b></p>
<ul>
<li>Corporate keys must always be on a <b>CPC-issued key ring, key tag and lanyard</b>, and attached to you by a belt clip, belt loop, or parka D-ring.</li>
<li><b>Never loan your keys</b> to a coworker. <b>Never leave keys in your vehicle</b>, even a locked trunk.</li>
<li>If keys are lost/stolen, contact your team leader immediately. If someone approaches and demands your keys, stay calm and don't do anything that puts your safety at risk.</li>
</ul>
<p><b>The high-rise pieces to learn on-site</b> (not fully covered in your PDFs): <span class="fillin">apartment-panel master-key handling</span>, <span class="fillin">buzzer / concierge access</span>, <span class="fillin">corporate mailroom drops</span>, and <span class="fillin">how parcels are handed off in a tower</span>.</p>
<div class="ask"><div class="ask-label">📋 Ask your supervisor / a senior high-rise carrier</div><ul>
<li>For apartment panels: do I get a <b>master key</b> on my ring, or is it signed out daily? Which buildings need which key?</li>
<li>How do I get into a building with a <b>buzzer / enterphone</b> when there's no concierge? Is there a standard suite/access code list?</li>
<li>At buildings with a <b>concierge</b>: what gets handed to the desk vs. delivered to panels/doors? Any sign-in?</li>
<li>How do <b>corporate / commercial mailroom</b> drops work? Do I sort into a wall of boxes, or hand a bundle to a mailroom clerk?</li>
<li>What's the move for a <b>"DELIVER TO DOOR"</b> item in a high-rise? Buzz the suite, leave a card, or hand to concierge?</li>
<li>Any towers with known <b>access quirks</b> (loading-dock entry, service elevator, restricted hours)?</li>
</ul></div>`},

{h:"10. LCD 2: Storefronts, SROs & Awareness (skeleton)",content:`<div class="lcd lcd2"><span class="lcd-label">LCD 2 only · DTES / Historic core</span><div>LCD 2 routes are street-level: storefronts, SRO hotels, social housing, community mailrooms, secure slots. The depot doc flags <b>situational awareness</b> as essential here. Frame below; fill in on-site.</div></div>
<p><b>What the training already gives you on personal safety:</b></p>
<ul>
<li>If you ever feel your <b>personal safety is at risk</b>, don't proceed. Don't enter a space or approach a door that doesn't feel safe.</li>
<li>Stay calm and avoid doing anything that escalates a situation. Keep the supervisors' names and the depot phone number(s) on you.</li>
<li>Keep your keys and equipment secured to your person at all times (see LCD 1 key rules, they apply everywhere).</li>
</ul>
<p><b>The DTES / storefront pieces to learn on-site:</b> <span class="fillin">SRO front-desk delivery</span>, <span class="fillin">community mailroom / secure-slot procedure</span>, <span class="fillin">which buildings to enter vs. hand off at the door</span>, and <span class="fillin">local awareness norms for the route</span>.</p>
<div class="ask"><div class="ask-label">📋 Ask your supervisor / a senior DTES carrier</div><ul>
<li>For <b>SRO hotels</b>: do I deliver to a front desk / clerk, to individual room slots, or a community mailroom? Any buildings I should not enter alone?</li>
<li>How do <b>secure mail slots</b> and <b>community mailrooms</b> work on this route? Keys, codes, or staff access?</li>
<li>Which storefronts / social-housing sites have <b>specific delivery instructions</b> or contact people?</li>
<li>What are the route's <b>situational-awareness norms</b>, such as areas, times, or buildings to be extra careful around, and what's the protocol if I don't feel safe?</li>
<li>Who exactly do I call, and how fast is the response, if something goes wrong on route?</li>
<li>Any buildings with <b>restricted hours</b> or where access depends on staff being present?</li>
</ul></div>`},
]},
{cat:"OTJ Checklist",title:"OTJ Training Checklist",subs:[
{h:"About This Checklist",content:`<p>This is the On-the-Job (OTJ) Training Session Checklist your peer mentor/coach will use to evaluate you. Tasks are marked <b>Observed</b> (you explained or demonstrated knowledge) or <b>Completed</b> (you performed it yourself). Tap any task to see the full procedure.</p>
<p><span class="depot-badge">SEQUENCED DEPOT</span> Your depot is sequenced. Non-sequenced depot tasks are <span style="opacity:.4;text-decoration:line-through">crossed out</span> below.</p>
<div class="warn">Review these tasks before each training day so you know what to focus on with your trainer.</div>`},
{h:"1. Start of Day (Inside Depot)",content:`
<h4>1.1 Identify main types of information on header board</h4>
<p>The header board has 6 main sections:</p>
<ul>
<li><b>General Information:</b> Depot name, route number, start time, departure time, total POC count, hazards/warnings, keys needed, phone, special instructions, AM/PM delivery portions, scheduled pickups, SLB clearances</li>
<li><b>OT Splits:</b> How to split the route if overtime is needed</li>
<li><b>NM Delivery:</b> Neighbourhood Mail schedule (3-day or 5-day cycle, colour days)</li>
<li><b>RPO / FSA / Stop:</b> The RPO, FSA, and stop number for each section</li>
<li><b>Street Distribution:</b> Ordered list of streets, address ranges, LDUs, tie-outs, stops</li>
<li><b>Transportation:</b> Vehicle type and details</li>
</ul>
<div class="danger">Always study the header board FIRST when on a new route.</div>

<h4>1.2 Identify how sort case is laid out</h4>
<p>The A-62 sortation case has 2-3 <b>modules</b>, each with multiple shelves. Each shelf has slots called <b>separations</b> (typically one per POC). Below each shelf is a <b>case strip</b> showing civic numbers and street names.</p>
<ul>
<li>Read modules like a book: left to right, top to bottom</li>
<li>Change in strip colour = change in street name</li>
<li>Tie-out numbers on the strip = order for pulling and bundling</li>
<li>Coloured stripes at base = NM colour day</li>
<li>Dog sticker = dog at that address</li>
<li>Red dot = Consumers' Choice opt-out (after civic number). Yellow dot = apartment/business opt-out</li>
</ul>
<div class="warn">In an A-62 case, you sort ABOVE the case strips.</div>

<h4>1.3 Sort in case cards - Forwarding/Hold</h4>
<p><b>Hold Mail (yellow card):</b> Do not deliver mail to this address for the dates shown. Barcoded items (not parcels) can be held. Parcels are excluded from Hold Mail and must be treated as RTS.</p>
<p><b>Forwarding/Redirection (orange card):</b> Remove mail for this address from the case and forward it to the new address. Card shows original address, new address, names, start/end dates, permanent or temporary, and local or forward. If your depot has no RS clerk, the A card goes with the forwarded mail and the B card replaces it in the case.</p>
<p>Remove expired case cards on the first working day AFTER the expiry date.</p>

<h4>1.4 Bring to workstation and sort manual S/L, O/S mail</h4>
<p>Collect your manual Short and Long (S/L) and Oversize (O/S) mail using your C-48 cart and bring it to your A-62 case.</p>
<ul>
<li>Start with <b>Standard Lettermail (STD)</b>: pick up a bundle addresses facing up</li>
<li>For each item: find the street name on the case strip, place mail in the separation ABOVE the address</li>
<li>Small OS items that fit go in case separations like STD</li>
<li>Large OS: place an identifier (flasher card or DNC) in the separation, put the OS item in an LFT or relay bag</li>
</ul>
<p><b>Blocking Technique</b> (for learning a new case): divide all mail by street name first, then sort into the case one street at a time.</p>

<h4>1.4.1 <span class="tag tag-blue">Sequenced Depot</span> Bring sequenced Lettermail to workstation (foot route only)</h4>
<p>In a sequenced depot, a large portion of STD mail is already machine-sorted into delivery sequence. Collect your sequenced lettermail trays and bring them to your workstation. You will merge these with your manually sorted mail during tie-out.</p>

<h4>1.5 Bring to workstation and sort Packets and Documents</h4>
<ul>
<li>Small packets/documents that fit in case separations are sorted like STD and OS mail</li>
<li>For large or unevenly shaped items that don't fit: place an identifier in the appropriate separation, put the item in an LFT or relay bag</li>
<li><b>All barcoded items must be scanned before they are sorted</b></li>
</ul>

<p class="na-row">1.5.1 <span class="tag tag-yellow">Non-Sequenced</span> Bring to workstation and sort Parcels (Motorized Route only) - N/A for your depot</p>

<h4>1.6 Revise the case - remove and place HOLD, FORWARDING mail</h4>
<p>After sorting, "revise" the case by removing mail you won't deliver on route. Items to remove:</p>
<ul>
<li><b>Mail forwarding</b> items (orange redirection case card)</li>
<li><b>Hold Mail</b> items (yellow case card)</li>
<li><b>Directs and Callers</b> (large-volume customers)</li>
<li><b>Missorts</b> (wrong route: put on case ledge or in missort separation)</li>
<li><b>Return to Sender</b> / Undeliverable items</li>
<li><b>Damaged mail</b></li>
</ul>

<h4>1.7 Obtain key ring and route supplies, including DNCs</h4>
<ul>
<li>Get your key ring from the key management area. Keys must be on a CPC-issued key ring, key tag, and lanyard.</li>
<li>Attach keys to your person by belt clip, belt loop, or parka D-ring.</li>
<li>Grab an adequate supply of DNCs for your call-for site(s).</li>
<li>Verify you have the correct DNCs for the correct call-for site.</li>
</ul>
`},
{h:"2. Neighbourhood Mail (NM)",content:`
<h4>2.1 Obtain the NM mailings prepared during last shift</h4>
<p>NM is typically prepared the previous evening (or end of the prior shift). Collect your pre-prepared NM bundles from the designated staging area.</p>

<h4>2.2 Scan DCS barcode colour of mailings being delivered today</h4>
<p>Each NM bundle has a Delivery Control Slip (DCS) with a blue barcode. Scan the DCS barcode before leaving the depot. This registers what NM you are taking out for delivery.</p>
<div class="warn">You must scan the DCS barcode for each NM mailing you are delivering that day.</div>

<h4>2.3 Prepare NM mail</h4>
<ul>
<li>Check the header board for the NM delivery schedule (colour day) and which sections of the route receive NM today</li>
<li>Count pieces per bundle using DCS totals</li>
<li>Use the NM totals from the header board: total POCs minus Consumers' Choice POCs = how many pieces you need per stop</li>
</ul>

<h4>2.4 Identify Consumers' Choice locations</h4>
<ul>
<li><b>Red dot</b> on case strip (after the civic number) = residential customer opted out of NM. Do NOT deliver NM to this address.</li>
<li><b>Yellow dot</b> = apartment or business opted out of NM</li>
</ul>
`},
{h:"3. PDT (Inside Depot)",content:`
<h4>3.1 Obtain PDT, log in and confirm battery charge</h4>
<p>Pick up your PDT from the charging cradle. Log in, then verify the battery is fully charged. Keep PDT secured at all times. Lock the touch screen when not using it.</p>

<h4>3.2 Download and verify Out for Delivery items (OFD) in Itinerary</h4>
<p>After logging in, your OFD itinerary downloads automatically. Review the list of barcoded items assigned to your route for delivery today.</p>

<h4>3.3 Edit alerts in PDT for Mail Forwarding items</h4>
<p>The PDT will show alerts for addresses with active mail forwarding (redirection). Review these alerts and confirm they match the orange redirection case cards in your case. Remove forwarded mail from your delivery.</p>

<h4>3.4 Edit alerts in PDT for Hold Mail items</h4>
<p>Similarly, the PDT will show alerts for Hold Mail addresses. Confirm these match the yellow Hold Mail case cards. Remove held mail from your delivery. Remember: parcels cannot be held and must be returned to sender.</p>

<h4>3.5 Place Forwarding Mail, Hold Mail, incomplete address and Missorted mail in designated areas</h4>
<ul>
<li><b>Forwarding mail:</b> Place in the designated redirection/forwarding area</li>
<li><b>Hold Mail:</b> Place in the Hold Mail separation or area</li>
<li><b>Incomplete address:</b> Place in the designated incomplete address area</li>
<li><b>Missorted in-depot:</b> Put on case ledge or in case separation designated for missorts</li>
<li><b>Missorted out-of-depot:</b> Same location, it will be routed to the correct depot</li>
</ul>

<h4>3.6 Prepare Card for Pickup items (COD and DTPO items)</h4>
<p>Identify items requiring Collect on Delivery (customs fees, postage due) and Deliver to Post Office (DTPO) items. Set these aside for special handling during delivery. DTPO goes directly to the designated post office, not to the customer's address.</p>

<h4>3.7 Sort and scan all Packets and Documents</h4>
<p>All barcoded packets and documents must be scanned before sorting into the case. Use the four scanning rules:</p>
<ol>
<li>Hash marks and logo? Scan that barcode.</li>
<li>Logo only? Scan that barcode.</li>
<li>RaCHEL rule: 2-9-2 barcode starting with R, C, H, E, or L? Scan it.</li>
<li>None of the above? Don't scan.</li>
</ol>

<h4>3.8 Confirm OFD itinerary</h4>
<p>After sorting and scanning, confirm your OFD itinerary on the PDT. This verifies that all items assigned to your route are accounted for.</p>

<h4>3.9 Review Pickups list</h4>
<p>Check the PDT for any scheduled commercial pickups on your route today. Note the customer name, address, and pickup time. Check your header board for scheduled customer pickups too.</p>

<h4>3.10 Review Clearances list</h4>
<p>Check the PDT and header board for SLB, CMB, and RPO clearances on your route. Note locations and any special instructions.</p>

<h4>3.11 Scan key ring: Key Ring Check Out in PDT</h4>
<p>Before leaving the depot, scan your key ring barcode on the PDT to check out your keys. This records that you have the keys and creates accountability.</p>

<h4>3.12 Obtain a blank IDB form as PDT backup</h4>
<p>Get a blank Items Delivered Bill (IDB) form in case your PDT becomes inoperable on route. The IDB is a paper backup for recording deliveries. Forms 108 and 105 must accompany you on route in case the PDT fails.</p>
<div class="warn">You must check your PDT daily before leaving the depot for customer pickup info. On Demand pickups may be added during the day.</div>
`},
{h:"4. Foot Route (Departure)",content:`
<h4>4.1 Tag all Relay Bags</h4>
<p>Label each relay bag with a route card identifying the route and relay box location. This ensures bags are delivered to the correct relay box by the motorized transport.</p>

<h4>4.1.1 <span class="tag tag-blue">Sequenced Depot</span> Tie out case-sorted mail while merging with sequenced mail</h4>
<p>In a sequenced depot, you merge your manually sorted mail with the machine-sequenced lettermail during tie-out:</p>
<ol>
<li>Start at tie-out #1 and pull the manually sorted mail from the case separations in order</li>
<li>Combine with the corresponding sequenced mail for each tie-out</li>
<li>Bundle each tie-out together with an elastic band</li>
<li>Place bundled mail into LFTs or relay bags in delivery sequence</li>
</ol>

<p class="na-row">4.1.2 <span class="tag tag-yellow">Non-Sequenced</span> Tie out all case-sorted mail - N/A for your depot</p>

<h4>4.2 Load relay bags with sorted mail, NM, packets, etc.</h4>
<p>Place bundled tie-outs, NM, packets, and documents into relay bags in delivery order. Include any oversize items or identifier cards.</p>

<h4>4.3 Load satchel for first route segment (Carry section)</h4>
<p>Load your dual satchel with the mail for your first carry section. Max load: <b>15.9 kg (35 lb)</b>. Include the corresponding NM, packets, and any barcoded items for that segment.</p>
`},
{h:"5. Motorized Route (Departure)",content:`
<h4>5.1 Tie out LFT for Park and Loop (lay bundles flat)</h4>
<p>For Park and Loop stops, tie out your mail and lay the bundles <b>flat</b> in the LFT. This keeps them organized for when you park and walk the loop.</p>

<h4>5.2 Tie out LFT for Stop and Go (stand bundles on end)</h4>
<p>For Stop and Go (dismount) stops, tie out your mail and stand the bundles <b>on end</b> in the LFT. This makes them easy to grab one at a time as you drive stop to stop.</p>

<h4>5.2.1 <span class="tag tag-blue">Sequenced Depot</span> Bring all tied-out mail to Consolidation Area</h4>
<p>In your sequenced depot, bring all your tied-out manual mail to the Consolidation Area where it will be combined with sequenced mail and parcels for loading.</p>

<h4>5.2.2 <span class="tag tag-blue">Sequenced Depot</span> Obtain Parcels and Sequenced Lettermail</h4>
<p>Pick up your parcels and sequenced lettermail trays from the consolidation area. These are organized by your route for loading into the vehicle.</p>

<p class="na-row">5.2.3 <span class="tag tag-yellow">Non-Sequenced</span> Bring all sorted mail items to loading dock - N/A for your depot</p>

<h4>5.3 Obtain supplies to be delivered to RPOs, if applicable</h4>
<p>If your route includes RPO supply delivery, collect the supplies (blank forms, materials, etc.) from the designated area before loading your vehicle.</p>

<h4>5.4 Obtain vehicle keys, fuel card, Route Kit, etc.</h4>
<p>Collect your vehicle keys, fuel card, and route kit. The route kit may include a dolly, SO-95 containers for SLB clearances, and other equipment.</p>

<h4>5.5 Perform pre-trip inspection of vehicle and record info on PDT</h4>
<ol>
<li>Go to parking lot and locate your vehicle</li>
<li>Perform a complete pre-trip inspection (lights, tires, mirrors, fluid levels, damage)</li>
<li>Record the vehicle's mileage and date in the PDT</li>
<li>Move vehicle from parking lot to designated dock space, back in carefully</li>
</ol>
`},
{h:"6. Prepare for Departure",content:`
<h4>6.1 Assess weather conditions for whole day/route</h4>
<p>Check the weather forecast and conditions. Plan for temperature changes throughout the day. Note if ice, rain, or extreme heat may affect your route.</p>

<h4>6.2 Obtain/put on personal protective equipment</h4>
<ul>
<li><b>High-visibility vest</b> - wear zipped up at all times (depot and route)</li>
<li><b>Puncture-resistant gloves</b> - for clearing SLBs</li>
<li><b>Dog repellent or air horn</b> - carry in holster, even if no warnings on the report</li>
<li><b>Anti-slip devices</b> - have them with you, wear on ice, remove before going indoors/driving</li>
<li><b>Head lamp</b> - if working in low light</li>
<li>Weather-appropriate clothing and footwear</li>
<li>Emergency medication (epi-pen, inhaler) if needed</li>
</ul>

<h4>6.3 Organize/bring route/emergency contact information</h4>
<p>Have your team leader's phone number and emergency contact information. Review the Hazards & Warnings report on your PDT (POCUR app > Reports) for dog hazards and other warnings on your route.</p>

<h4>6.4 Final test PDT and ensure battery is charged</h4>
<p>Verify the PDT is working properly and has sufficient battery charge for the full shift. You can dial 911 from the PDT in emergencies (select phone key, dial 911, select phone icon).</p>
`},
{h:"7. Delivery to Mail Receptacles",content:`
<h4>7.1 <span class="tag tag-blue">Sequenced Depot</span> Back-to-back delivery method</h4>
<p>Bundle sequenced and manual mail together (and NM if applicable) and deliver using the back-to-back method:</p>
<ol>
<li>Obtain a bundle from the satchel, hold in your preferred carrying hand</li>
<li>Remove elastics with your other hand</li>
<li>Place both bundles onto your forearm</li>
<li>Take sequenced bundle and place it upside-down in your hand (address facing away)</li>
<li>Move manual mail down in front of sequenced mail. Addresses will face opposite directions.</li>
<li>To see sequenced mail: pivot/rotate your carrying hand, resting bundle on forearm</li>
<li>Grab required mail for the POC with your other hand</li>
<li>Reverse the bundle to obtain manual mail for that POC</li>
<li>Hold and deliver with your other hand</li>
<li>Grab corresponding NM for that POC</li>
</ol>

<h4>7.2 Obtain mail from a relay box (foot route only)</h4>
<p>At each relay box location on your route, retrieve the relay bag left by the motorized transport. Load your satchel with the mail for the next carry section.</p>

<h4>7.3 Deliver mail from a Park and Loop stop (motorized only)</h4>
<p>Park the vehicle at the designated stop. Grab the appropriate tie-out bundles from the LFT (laid flat). Walk the loop delivering to each POC, then return to the vehicle and drive to the next stop.</p>

<h4>7.4 Deliver mail from a Stop and Go stop (motorized only)</h4>
<p>Drive to each POC, park, get out, deliver the mail, return to the vehicle and drive to the next POC. Bundles are standing on end in the LFT for easy grab-and-go.</p>

<h4>7.5 Deliver mail/parcel to a CMB</h4>
<ol>
<li>Retrieve returned parcel compartment keys from the outgoing mail slot. Put each key back in its correct compartment.</li>
<li>Sort the letter mail into customer compartments</li>
<li>Place NM into compartments (skip Consumers' Choice customers)</li>
<li>Put packets and small parcels into compartments</li>
<li>Put larger parcels into parcel compartments. Write the date on the parcel. Place the parcel compartment key in the customer's mail compartment.</li>
<li>If Attention box says Signature/Payment/Proof of Age/Deliver to Door, or parcel compartment is full (items under 2 days) or item too large: deliver to the customer's door instead.</li>
</ol>
<div class="warn">Always scan the outgoing mail compartment barcode, even if no mail to deliver. Always clear the outgoing mail.</div>

<h4>7.6 Deliver a parcel to a Parcel Locker</h4>
<ol>
<li>Open master door with your corporate key</li>
<li>Transfer returned compartment keys from outgoing slot to proper compartments</li>
<li>Remove and card overdue parcels (over 5 days, or 2+ days if room needed)</li>
<li>Deposit new parcels with date facing out. Note compartment keys with apartment numbers.</li>
<li>At the mailroom/lockbox assembly, remove parcel locker keys for carded items, deliver DNCs to POCs</li>
<li>Deliver all other mail and NM</li>
<li>Return to parcel locker on your way out, deposit retrieved keys in outgoing slot</li>
</ol>

<h4>7.7 Clear and card parcel past 5 days in CMB/Parcel Locker</h4>
<ol>
<li>Check endorsement dates on parcels in the compartment</li>
<li>Remove the unclaimed item</li>
<li>Complete a DNC and place it in the customer's mail compartment</li>
<li>Scan the parcel and change status to Carded on PDT</li>
<li>Transfer the item to the RPO</li>
</ol>
<div class="warn">Parcels can remain up to 5 business days if space is not needed. If you need room for new parcels, you can card items that have been there 2+ days.</div>

<h4>7.8 Deliver mail to a residential mail box</h4>
<p>Place mail in the customer's residential mailbox. Follow the route as designed. Verify the entire address. Do not nest NM inside other mail pieces.</p>

<h4>7.9 Deliver mail to an apartment mail room</h4>
<p>Use your corporate key to access the mail room. Sort mail into the individual lock box compartments. Pick up any mail dropped on the floor (mark with small X on back, re-sort). Watch for barcoded items mixed in with regular mail.</p>

<h4>7.10 Deliver mail to a panel</h4>
<p>A panel is a set of letter slots (similar to apartment lock boxes) typically found in commercial or multi-unit buildings. Sort mail into the correct slots by unit number or name.</p>

<h4>7.11 Deliver mail door-to-door in an apartment/condominium</h4>
<p>For buildings where you deliver directly to each unit's door (no central mail room). Take the mail for the building, proceed floor by floor, and deliver to each door's mail slot or receptacle.</p>

<h4>7.12 Deliver mail to each POC in a business tower</h4>
<p>Deliver to each business suite or office within the tower. You may deliver to a reception desk, mailroom counter, or individual suites depending on the building arrangement.</p>
`},
{h:"8. Delivery with PDT / PCI Items",content:`
<h4>8.1 Deliver a signature required item</h4>
<p>Check the label for "Signature Required." Scan the item with your PDT. Have the customer sign on the PDT screen. Deliver the item.</p>
<div class="warn">Never sign for an item on behalf of the receiver. If the person can't sign, enter an X. If you can't get their name, enter an X.</div>

<h4>8.2 Deliver a non-signature item</h4>
<p>Scan the barcoded item with your PDT. No signature needed. Deliver to the mail receptacle or safe drop if appropriate. Always verify the address.</p>

<h4>8.3 Card an item (Delivery Notice Card) at the door</h4>
<ol>
<li>Verify you're using the correct DNC for the call-for site matching the address</li>
<li>Write the customer's first and last name and address</li>
<li>Check off delivery options that apply. Enter funds due if applicable.</li>
<li>Enter the date and when the item will be available</li>
<li>Scan the item as "carded," then scan the DNC's barcode</li>
</ol>
<p>Leave the DNC in the customer's mail receptacle or on the door, ensuring it's visible. If the customer appears after you left the DNC but before you leave the POC: tear up the DNC, use PDT for signature/payment/proof of age, hand over the item.</p>

<h4>8.4 Deliver a Customs Postal Import item</h4>
<p>Check the PDT for the customs amount owing. Inform the customer of the fee. Collect payment (credit card, prepaid card, CPC commercial account, or Proof of Payment number). If the customer disputes the fee, explain they can appeal through CBSA. <b>If they refuse to pay, do NOT deliver the item.</b></p>
<div class="danger">Customers CANNOT pay with cash, cheques, money orders, or debit cards. If they want these methods, provide a DNC and direct them to the RPO.</div>

<h4>8.5 Deliver a Proof of Age required item</h4>
<p>The label will show "18+ SIGNATURE." Ask for government-issued photo ID. Verify the customer's age. If they are under age or can't provide valid ID, card the item. Proof of Age items cannot be safe dropped.</p>

<h4>8.6 Deliver a Safe Drop item</h4>
<p>If no one is home and it's a non-PCI item, check safe drop eligibility:</p>
<ul>
<li>Safe-drop approved neighbourhood</li>
<li>Location is protected from weather and out of sight</li>
<li>Not perishable</li>
<li>Label does NOT say "No safe drop"</li>
</ul>
<p>Scan the item, mark as safe drop on PDT. Take a photo with PDT to document where you left it.</p>

<h4>8.7 Deliver a Leave At Door (Do Not Card) item</h4>
<p>Label reads "Leave at Door." First attempt to deliver to the POC's mail receptacle (e.g., mailbox, CMB). If the delivery attempt is unsuccessful, safe drop the item as long as eligibility requirements are met.</p>

<h4>8.8 Deliver a Deliver to the Door (All Modes) item</h4>
<p>Label reads "DELIVER TO DOOR." You <b>must</b> go to the customer's door, regardless of the regular delivery method (even if normal delivery is to a CMB, apartment mailbox, etc.).</p>

<h4>8.9 Deliver a PCI using an IDB instead of PDT</h4>
<p>If your PDT is inoperable, use the paper IDB (Items Delivered Bill) form. Record the tracking number, customer information, and delivery details. Have the customer sign the IDB form. Note: you cannot accept credit cards when using an IDB.</p>
`},
{h:"9. Transfers to RPOs",content:`
<h4>9.1 Drop off mail and supplies for the RPO; record in PDT</h4>
<p>If your route includes an RPO supply delivery, drop off the supplies and mail at the RPO. Record the drop-off on your PDT.</p>

<h4>9.2 Deliver carded items with a Delivery Transfer Bill to the RPO using PDT</h4>
<p>Transfer all carded items to the call-for site (RPO) by the cut-off time noted on the Transfer Bill. Scan each item on the PDT during the transfer. Place carded items behind bulkhead in your vehicle, organized by call-for location.</p>

<h4>9.3 Drop off carded items to appropriate RPO if scheduled</h4>
<p>Some routes have a scheduled RPO drop-off time. Make sure you arrive on time. Separate carded items by RPO if your route serves more than one call-for site.</p>
`},
{h:"10. Pickups & Clearances (Motorized Only)",content:`
<h4>10.1 Clear mail from an SLB and scan barcode with PDT</h4>
<ol>
<li>Wear puncture-resistant gloves</li>
<li>Open the door and look inside to check for safety hazards</li>
<li>Place any suspicious materials in a separate container and note the location</li>
<li>Remove the SO-95 container with the posted mail</li>
<li>Scan the SLB barcode with your PDT</li>
<li>Replace with an empty SO-95</li>
</ol>
<div class="danger">Do not handle dangerous goods. Contact your supervisor immediately. You MUST always clear SLBs and capture it on the PDT, even if there is no outgoing mail.</div>

<h4>10.2 Clear outgoing mail from a CMB/Parcel Locker and scan barcode with PDT</h4>
<p>At every CMB on your route, clear the outgoing mail compartment and scan the barcode (right inside edge of the outgoing compartment). If the interior barcode is damaged, scan the exterior barcode.</p>
<div class="warn">You must check every CMB on your route, even if no mail is being delivered there that day.</div>

<h4>10.3 Clear mail from an RPO; record in PDT</h4>
<ol>
<li>Lock your vehicle, go into the RPO with equipment (dolly, SO-95s)</li>
<li>Place mail containers and parcels on the dolly. Keep types separate per local guidelines.</li>
<li>Collect mail from indoor and outdoor receptacles, plus containers/parcels from Retail staff</li>
<li>Scan the RPO's barcode with your PDT</li>
<li>Separate damaged mail into designated container</li>
</ol>

<h4>10.4 Complete a scheduled pick-up and verify shipping documents</h4>
<ol>
<li>Check your PDT for pickup instructions</li>
<li>If unsure about volume, bring a dolly</li>
<li>At the location, select the customer from the pickup list on your PDT</li>
<li>Select the appropriate label option</li>
<li>Verify the shipping documents: Bill of Lading (BOL), Manifest, Prepaid label, or EST-generated label</li>
<li>Scan the labels or manifest as required</li>
<li>If "MANIFEST NOT REQ" is on the label, it's paperless (no docs to collect)</li>
<li>Load your vehicle, keeping pickups separate from outgoing deliveries</li>
</ol>
<div class="warn">Always begin pickups at or after the scheduled start time. Never arrive early. If 50+ items on a manifest, you can visually estimate the count.</div>

<h4>10.5 Complete scheduled pickup: Full Rate/Stamped Lettermail</h4>
<p>Some pickups are just regular stamped lettermail (no barcoded parcels). Collect the mail, record on PDT, and load into your vehicle separate from deliveries.</p>

<h4>10.6 Complete scheduled pickup: No Pickup</h4>
<p>If you arrive at a scheduled pickup and there is nothing to pick up, record "No Pickup" on your PDT so it's documented.</p>

<h4>10.7 Accept/Decline an On Demand pickup request on the PDT</h4>
<p>On-Demand requests appear on your PDT during the day. You can accept or decline. Valid decline reasons: Not in my area, Vehicle disabled, Unable to reach before business close, No room in my truck, On break.</p>
<p>Make every effort to accept. If you decline and no one else is available, you may need to return to the depot to unload and go back.</p>

<h4>10.8 Complete an On Demand pickup using the PDT</h4>
<p>Same process as a scheduled pickup: go to the location, select the customer on PDT, verify shipping documents, scan items, load separately from deliveries.</p>
`},
{h:"11. Return to Depot (End of Day)",content:`
<h4>11.1 Unload all collected mail and stage in proper mail streams</h4>
<p>Back into the dock safely. Use your consolidation cart to transport items. Unload all mail collected on route (SLB mail, RPO mail, pickup items) into the designated containers at the dock. Keep different mail streams separate.</p>

<h4>11.2 Park and secure vehicle - remove all items and confirm empty</h4>
<p>After unloading, park your vehicle in the assigned space. Check every part of the vehicle to confirm it's completely empty of all mail and equipment, including DNCs.</p>
<div class="danger">Always ensure your vehicle is empty of ALL mail and equipment at the end of day, including DNCs.</div>

<h4>11.3 Return and secure keys/Log Book</h4>
<p>Return your corporate keys and other items. Return the vehicle log book if applicable. Never leave keys in your car, even in a locked trunk.</p>

<h4>11.4 Perform End-of-day PDT tasks:</h4>

<p><b>11.4.1 Complete a Money Slip on the PDT</b></p>
<p>If you collected any payments during the day (customs fees, COD), complete a Money Slip on the PDT to account for all funds collected.</p>

<p><b>11.4.2 Return, scan and secure Key Ring (Key Ring Check In)</b></p>
<p>Scan your key ring barcode on the PDT to check in your keys. Return them to the appropriate area/board.</p>

<p><b>11.4.3 Record NM Shortages/Overages in PDT (NM-DCS Exceptions)</b></p>
<ol>
<li>Select 'End of Day' then 'NM Exceptions' on PDT</li>
<li>Scan the blue barcode on the DCS (same one you scanned in the morning)</li>
<li>Select 'Overage' or 'Shortage'</li>
<li>Enter the count of extra or missing pieces</li>
<li>Submit</li>
</ol>

<p><b>11.4.4 Upload and dock PDT (Upload & Logout)</b></p>
<p>Confirm that you have completed the vehicle check. Select LOGOUT on PDT. Attach the PDT to the charging cradle. Verify it's properly installed and charging before walking away.</p>

<h4>11.5 Prepare NM for next day delivery:</h4>

<p><b>11.5.1 Determine delivery day - segment colour</b></p>
<p>Check the header board or NM Delivery Control board to determine tomorrow's colour day (which segments of the route receive NM).</p>

<p><b>11.5.2 Identify mailings to deliver from NM Delivery Control board</b></p>
<p>Find which NM mailings (flyers, brochures, etc.) need to go out tomorrow based on the colour day.</p>

<p><b>11.5.3 Verify and obtain each NM mailing and associated DCS</b></p>
<p>Collect each NM mailing bundle and its matching Delivery Control Slip. Verify the counts match.</p>

<p><b>11.5.4 Determine delivery instructions from a DCS</b></p>
<p>Read the DCS for any special delivery instructions (how many per POC, which sections of the route, etc.).</p>

<p><b>11.5.5 Bundle, collate and prepare each NM mailing according to DCS instructions</b></p>
<p>Assemble the NM bundles for each section of the route. Collate multiple NM items together if delivering more than one mailing to the same section. Use the NM totals from the header board (total POCs minus Consumers' Choice).</p>

<p><b>11.5.6 Record number of NM items delivered on the NM Form, if applicable</b></p>
<p>If your depot uses an NM delivery tracking form, record the number of items prepared for tomorrow's delivery.</p>
`},
{h:"Letter Carrier C-46 Cart Skills",content:`
<h4>1. Place satchel on cart</h4>
<p>Lock the cart in position before loading. Place a single satchel on the platform. Secure the satchel by sliding the metal rings over the cart hooks.</p>

<h4>2. Adjust cart</h4>
<p>Adjust the handle height to a comfortable position. When pulling uphill, the handle should be high enough to avoid foot contact. When pushing downhill, set handle at elbow height.</p>

<h4>3. Pull cart</h4>
<p>Place the cart behind you to pull up hills. Ensure handle is high enough to avoid contact with your foot while walking. Avoid extending your arm behind you or excessively bending your elbow.</p>

<h4>4. Push cart</h4>
<p>Place cart in front of you to push down hills. Adjust handle to elbow height. Arm should be relaxed at your side to prevent strain.</p>

<h4>5. Go up/down curbs and steps</h4>
<p><b>Going up:</b> Position wheels touching the curb. Stand facing the cart. Bend knees and pull cart up using the handle.</p>
<p><b>Going down:</b> Position cart facing the stairs at the edge. Bend knees and use the handle to carefully roll the cart over the step's edge.</p>
<p>Avoid moving carts over flights of more than 4 stairs.</p>

<h4>6. Go up/down hills, inclines/ramps and uneven surfaces</h4>
<p>Pull uphill (cart behind you), push downhill (cart in front). Watch for cracks, uneven surfaces, and tipping hazards. Avoid running over grass and uneven edges.</p>

<h4>7. Laneways/walkways and security</h4>
<p>Be aware of your surroundings. Hold the handle to maintain control at all times. Do not retrieve mail while the cart is in motion. Use ramps, elevators, and automatic door openers when available.</p>

<h4>8-9. Door opening toward/away from you</h4>
<p><b>Door toward you:</b> Position the cart to one side, open the door, hold it with your body, and maneuver the cart through.</p>
<p><b>Door away from you:</b> Push the door open, prop it if possible, and guide the cart through while maintaining control.</p>

<h4>10. Safe lifting techniques</h4>
<p>Bend at the knees, keep the load close to your body, lift with your legs (not your back). When loading/unloading the cart from a vehicle, ensure the satchel is detached first. Lay the cart flat in the vehicle.</p>

<h4>11. Load mail from a relay box</h4>
<p>At the relay box, retrieve your relay bag. Load the mail from the relay bag into your satchel on the cart. Organize for the next carry section.</p>

<h4>12-13. Load into / Unload from a vehicle</h4>
<p>Detach the satchel from the cart before loading. Use safe lifting techniques. Lay the cart flat in the vehicle to prevent rolling or tipping during transport.</p>

<h4>14. Board/disembark from bus (if applicable)</h4>
<p>When using the cart on a city bus: sit as close to the front as possible. Ensure the cart is not blocking an aisle. Keep one hand on the cart while the bus is in motion.</p>
`}
]},

<tr><th>Term</th><th>Definition</th></tr>
<tr><td><b>Header Board</b></td><td>The document that contains everything you need to know to deliver a route</td></tr>
<tr><td><b>Neighbourhood Mail (NM)</b></td><td>Advertising mail: flyers, coupons, samples, brochures, public notices, government and election promotions</td></tr>

{cat:"Sorting",title:"Sorting & Case Work",subs:[
{h:"A-62 Sortation Case",content:`<p>The sortation case sequences your mail in delivery order and divides the route into manageable portions. It has 2-3 <b>modules</b>, each with multiple shelves. Each shelf has slots called <b>separations</b> (typically one per POC).</p>
<div class="danger">In an A-62 sortation case, you sort ABOVE the case strips.</div>
<h4>Key Features at Your Case</h4>
<table><tr><th>Feature</th><th>Purpose</th></tr>
<tr><td>Header board</td><td>Route organization info</td></tr>
<tr><td>C-48 cart</td><td>Obtain mail from around the depot</td></tr>
<tr><td>Elastic band holder</td><td>Elastics for bundling</td></tr>
<tr><td>Anti-fatigue mat</td><td>Reduces effects of standing</td></tr>
<tr><td>Case ledge</td><td>Surface for sorting and organizing</td></tr>
</table>`},
{h:"Reading the Case Strip",content:`<p>Below each shelf is a <b>case strip</b> showing civic numbers and street names. Key information on case strips:</p>
<ul>
<li><b>Change in strip colour</b> = change in street name</li>
<li><b>Tie-out numbers</b> = order to pull out and bundle mail after sorting</li>
<li><b>Coloured stripes at base</b> = which "colour day" for Neighbourhood Mail</li>
<li><b>Business name</b> = if there is one at that address</li>
<li><b>Dog sticker</b> = dog at that address</li>
<li><b>Red dot (Consumers' Choice)</b> = customer opted out of NM. Red dot always appears AFTER the civic number. Yellow dot = apartment or business opt-out</li>
</ul>
<h4>Sorting Direction</h4>
<p>Sort mail to match how civic addresses fall on the case strip. Higher number on left = sort with higher number to left. Match the case strip order because that's your line of route.</p>`},
{h:"Where to Start When Sorting",content:`<ol class="steps">
<li>Start with <b>Standard Lettermail (STD)</b>. Pick up a bundle with addresses facing up.</li>
<li>For each item: look at the address, find the street name on the case strip.</li>
<li>Read case modules like a book: left to right, top to bottom.</li>
<li>Place the mail in the separation ABOVE the address on the case strip.</li>
</ol>
<h4>Sorting Different Mail Types</h4>
<table><tr><th>Type</th><th>How to Sort</th></tr>
<tr><td>Standard (STD)</td><td>Sort directly into case separations</td></tr>
<tr><td>Oversize (OS)</td><td>Small OS goes in case like STD. Large OS: place identifier card in separation, put OS item in LFT or relay bag</td></tr>
<tr><td>Packets & Documents</td><td>Small ones go in case. Large/uneven: use identifier card in separation, item goes in LFT or relay bag</td></tr>
<tr><td>Barcoded Items</td><td>All barcoded items must be scanned BEFORE sorting</td></tr>
</table>
<h4>Blocking Technique</h4>
<p>For new employees learning a case: divide all mail by street name first, then sort into the case one street at a time.</p>`},
{h:"1000 Series Routes",content:`<p>Some routes have more POCs than the A-62 case can hold. The flip side of the case strips is used for additional points of call. These are called <b>1000 series routes</b> (also called flip routes or phantom routes).</p>
<p>If you have a 1000 series route, you sort and tie out the first portion, then flip the case strips to sort the second portion.</p>
<div class="warn">If tie-out numbers start with "1006" or similar, you have a 1000 series route.</div>`}
]},
{cat:"Header Board",title:"Reading the Header Board",subs:[
{h:"Overview",content:`<div class="danger">Always study the header board FIRST when on a new route.</div>
<p>The header board provides everything you need to know about the route. All header boards contain the same basic information across 6 main sections:</p>

<tr><td>Transportation</td><td>Vehicle type and details for motorized routes</td></tr>
</table>`},
{h:"General Information Details",content:`<p>Key fields in the general information section:</p>
<ul>
<li><b>A.</b> Depot Name and Route Number</li>
<li><b>B.</b> Start Time</li>
<li><b>C.</b> Estimated Departure Time from Depot</li>
<li><b>D.</b> Total POC count</li>
<li><b>E.</b> Total Hazards/Warnings</li>
<li><b>F.</b> Keys needed</li>
<li><b>G.</b> Phone number</li>
<li><b>H.</b> Special Instructions (may include Directs and Callers info)</li>
<li><b>I.</b> AM and PM Delivery Portions</li>
<li><b>J.</b> Scheduled Customer Pickup and SLB Clearances</li>
<li><b>K.</b> OT Splits</li>
<li><b>L.</b> Neighbourhood Mail Delivery schedule</li>
</ul>`},
{h:"Tie-Out or Pull Section",content:`<p>This section shows:</p>
<ul>
<li><b>A.</b> RPO and FSA</li>
<li><b>B.</b> Stop number</li>
<li><b>C.</b> Tie-Out column</li>
<li><b>D.</b> Street Name and Civic Address range</li>
<li><b>E.</b> Residence (R), Apartment (A), and Business (C/B) counts</li>
<li><b>F.</b> Neighbourhood Mail (NM) and Consumer's Choice counts</li>
<li><b>G.</b> POC and NM totals</li>
</ul>
<h4>Colour Bars</h4>
<p>Horizontal <b>green bars</b> indicate a vehicle stop (motorized) or relay box location (foot routes) and the delivery area beneath.</p>
<h4>NM Colour Days</h4>
<p>The tie-out section shows what sections of the route to deliver on each colour day. NM columns show total POCs <b>minus</b> Consumers' Choice POCs.</p>`},
{h:"Route Map",content:`<p>Each header board has an accompanying route map showing:</p>
<ul>
<li>AM and PM sections of the route</li>
<li>Direction of travel (arrows)</li>
<li>LDUs for the delivery areas</li>
</ul>
<div class="warn">Study the route map BEFORE leaving the depot when new to a route. Having the street layout in mind helps you visualize your delivery day.</div>`}
]},
{cat:"Tying Out",title:"Tying Out the Mail",subs:[
{h:"What is Tying Out?",content:`<p>After sorting, you pull the mail from the case in a specific order and bundle it with elastics. This is called <b>tying out</b>. The tie-out numbers on the case strip tell you the order.</p>`},
{h:"Types of Stops",content:`<table><tr><th>Stop Type</th><th>Description</th></tr>
<tr><td>Park & Loop</td><td>Park the vehicle, walk a loop delivering mail, return to vehicle</td></tr>
<tr><td>Dismount</td><td>Drive to each POC, get out, deliver, return to vehicle</td></tr>
<tr><td>CMB Stop</td><td>Drive to a Community Mailbox site, deliver to all compartments</td></tr>
</table>`},
{h:"Tie-Out Process",content:`<ol class="steps">
<li>Start at tie-out #1 and pull the mail from the case separations in order</li>
<li>Bundle the mail for each tie-out with an elastic band</li>
<li>Place bundled mail into LFTs in delivery sequence</li>
<li>Include any oversize items, packets, or parcels with the correct tie-out</li>
<li>Check that no mail is left in the case separations</li>
</ol>`}
]},
{cat:"NM",title:"Neighbourhood Mail",subs:[
{h:"What is Neighbourhood Mail?",content:`<p>Neighbourhood Mail (NM) includes flyers, coupons, samples, brochures, public notices, and government/election promotions. It is delivered on a colour-day rotation schedule.</p>`},
{h:"Delivery Cycles",content:`<p>Routes follow either a <b>3-day</b> or <b>5-day</b> delivery cycle. The header board shows which sections of the route get NM on which colour day.</p>
<p>Coloured stripes on the base of the case strip indicate which colour day each section receives NM.</p>`},
{h:"Delivery Control Slip (DCS)",content:`<p>Each NM bundle comes with a DCS showing:</p>
<ul>
<li>The number of pieces in the bundle</li>
<li>Which route and colour day it belongs to</li>
<li>A blue barcode to scan</li>
</ul>
<div class="warn">Scan the DCS blue barcode before leaving the depot. At end of day, record overages and shortages through NM Exceptions on the PDT.</div>`},
{h:"Preparing NM",content:`<ul>
<li>Count the pieces per bundle using DCS totals</li>
<li>Use the NM totals from the header board to determine how many pieces you need per stop</li>
<li>NM totals = total POCs minus Consumers' Choice POCs</li>
<li>Do NOT deliver NM to Consumers' Choice addresses (red dot on case strip)</li>
</ul>`},
{h:"End of Day NM",content:`<ol class="steps">
<li>Select 'End of Day' then 'NM Exceptions' on PDT</li>
<li>Scan the blue barcode on the DCS</li>
<li>Select 'Overage' or 'Shortage'</li>
<li>Enter the count of extra or missing pieces</li>
<li>Submit</li>
</ol>`}
]},
{cat:"Delivery",title:"Delivery Procedures",subs:[
{h:"Safe Drop vs. Carding",content:`<table><tr><th>Safe Drop (OK)</th><th>Must Card (DNC)</th></tr>
<tr><td>Non-PCI items</td><td>Collection of payment</td></tr>
<tr><td>Safe-drop approved neighbourhood</td><td>Registered Mail</td></tr>
<tr><td>Location protected from weather and out of sight</td><td>Priority - Signature required</td></tr>
<tr><td>Too large for mail receptacle</td><td>Proof of age or identity required</td></tr>
<tr><td>Not perishable</td><td>Label says "No safe drop"</td></tr>
<tr><td></td><td>Perishable item</td></tr>
<tr><td></td><td>Left in parcel locker or CMB for more than 5 days</td></tr>
</table>`},
{h:"Delivery Notice Card (DNC)",content:`<p>Left when an item cannot be delivered. It tells the customer where and when to pick up their item.</p>
<h4>How to Fill Out the DNC</h4>
<ol class="steps">
<li>Verify you're using the correct DNC for the call-for site that matches the address</li>
<li>Write the customer's first and last name and address</li>
<li>Check off any delivery options that apply. Enter amount of funds due if applicable</li>
<li>Enter the date the card was completed and when the item will be available</li>
<li>Scan the item as "carded," then scan the DNC's barcode</li>
</ol>
<h4>DNC Tips</h4>
<ul>
<li>Always fill out the complete name and address</li>
<li>Never place a DNC sticker over the address field or any barcode</li>
<li>Ensure adequate supply of cards before leaving depot</li>
<li>Remove extra cards from your vehicle at end of day</li>
<li>Transfer all carded items to the Call-for site by the cut-off time on the Transfer Bill</li>
</ul>
<h4>If Customer Appears After You Left DNC</h4>
<p>If still at the POC: tear up the DNC (discard at depot), use PDT to collect signature/payment/proof of age as needed, and hand over the item.</p>`},
{h:"Personal Contact Items (PCI)",content:`<div class="danger">PCI items must NEVER be delivered to a CMB or left as a safe drop. They must always be handed directly to the customer.</div>
<p>Check the label on every item you deliver. PCI requirements are always marked on the label:</p>
<ul>
<li><b>Signature Required</b> - customer must sign on PDT</li>
<li><b>18+ Signature</b> - proof of age with government-issued photo ID</li>
<li><b>Payment Due</b> - customs or other fees to collect</li>
</ul>
<div class="warn">Never sign for an item on behalf of the receiver. If the person can't sign, enter an X. If you can't get their name, enter an X.</div>`},
{h:"Deliver to Door - All Modes",content:`<p>When a label says "DELIVER TO DOOR," you <b>must</b> go to the customer's door, regardless of regular delivery mode (apartment mailbox, CMB, etc.).</p>
<p>"Leave at Door" means first attempt to the POC mail receptacle. If delivery attempt is unsuccessful, safe drop the item (if eligible).</p>`},
{h:"Registered Mail",content:`<p>Requires proof of mailing and/or proof of delivery. Signature of addressee or representative is required.</p>
<h4>How to Identify</h4>
<ul>
<li><b>Domestic:</b> Large "R" and "Registered" on label. 2-9-2 barcode starts with R.</li>
<li><b>International:</b> May show large R or "Registered" on label. First letter of 2-9-2 barcode is always R.</li>
</ul>
<div class="warn">Registered Mail cannot be safe dropped. If customer is not home, card the item.</div>`},
{h:"FlexDelivery",content:`<p>Canada Post service that lets customers have online purchases delivered to a pre-selected post office instead of home. Label will show "FlexDelivery" and an RPO address (PO BOX).</p>`},
{h:"Deliver to Post Office (DTPO)",content:`<p>Commercial service for business customers. Allows direct delivery to a chosen post office. Applies to Xpresspost and Expedited parcels only. Label shows "DELIVER TO PO / LIVRER AU B. DE P."</p>`}
]},
{cat:"CMB",title:"CMB & Parcel Lockers",subs:[
{h:"Delivering to a CMB",content:`<ol class="steps">
<li>Retrieve returned parcel compartment keys from outgoing mail slot. Put each key back in its correct compartment.</li>
<li>Sort the mail into customer compartments.</li>
<li>Place Neighbourhood Mail into compartments (skip Consumers' Choice customers).</li>
<li>Put packets and small parcels into compartments (check they fit easily).</li>
<li>Put parcels too large for mail compartments into parcel compartments. Check the Attention box for special instructions. Write the date on the parcel. Place parcel compartment key in the customer's mail compartment so they see it when they open the door.</li>
<li>If Attention box says Signature/Payment/Proof of Age/Deliver to Door, or if parcel compartment is full (items under 2 days old) or item is too large: deliver to the customer's door.</li>
</ol>
<div class="warn">Always scan the outgoing mail compartment barcode, even if there's no mail to deliver to that site. Always clear the outgoing mail.</div>`},
{h:"Unclaimed Items in Parcel Compartments",content:`<table><tr><th>Step</th><th>Action</th></tr>
<tr><td>1. Check dates</td><td>Items may remain up to 5 business days if space is not needed</td></tr>
<tr><td>2. Remove item</td><td>Take the unclaimed item out</td></tr>
<tr><td>3. Complete DNC</td><td>Place DNC in customer's mail compartment</td></tr>
<tr><td>4. Update status</td><td>Scan parcel and change status to Carded</td></tr>
<tr><td>5. Transfer</td><td>Take item to the RPO</td></tr>
</table>`},
{h:"Reporting CMB Damage",content:`<ol class="steps">
<li>Scan the unit's barcode (right inside edge of outgoing mail compartment). If interior barcode is damaged, scan the external barcode.</li>
<li>Indicate the appropriate damage reason code</li>
<li>If mail is compromised, secure it and notify your supervisor</li>
</ol>`},
{h:"Customer Accommodation (Weekly To-the-Door)",content:`<p>Some customers can't access the CMB. Three types of accommodation identifiers in the compartment:</p>
<table><tr><th>Colour</th><th>Type</th></tr>
<tr><td>Red</td><td>Permanent door delivery</td></tr>
<tr><td>Blue</td><td>Seasonal door delivery</td></tr>
<tr><td>Green</td><td>Temporary door delivery</td></tr>
</table>
<p>When you see an identifier: deliver mail (including NM) to the CMB compartment daily. Every Wednesday, clear the compartment and deliver all accumulated mail to the door.</p>
<div class="danger">Deliver parcels, packets, and Registered items to the door on the day they are received, not on Wednesday.</div>`},
{h:"Parcel Lockers (E100, E200, E211)",content:`<table><tr><th>Model</th><th>Key Return</th></tr>
<tr><td>E100</td><td>Customer returns key via outgoing mail slot</td></tr>
<tr><td>E200</td><td>Customer returns key via designated slot on each compartment door</td></tr>
<tr><td>E211</td><td>Outdoor version with same features as E200</td></tr>
</table>
<h4>Delivering to Parcel Lockers</h4>
<ol class="steps">
<li>Open master door with your corporate key</li>
<li>Transfer returned compartment keys from outgoing slot to their proper compartments</li>
<li>Remove and card overdue parcels (over 5 days, or 2+ days if room is needed)</li>
<li>Deposit new parcels with date facing out. Note compartment keys with apartment numbers on paper.</li>
<li>At the mailroom/lockbox assembly, remove parcel locker keys for carded items, deliver DNCs to POCs</li>
<li>Deliver all other mail items including NM</li>
<li>Return to parcel locker on your way out, deposit retrieved compartment keys in outgoing slot</li>
</ol>
<div class="warn">Parcels can remain up to 5 business days. Check dates on parcels that have been there for more than 2 days.</div>`},
{h:"Damaged Parcel Locker",content:`<ol class="steps">
<li>Assess the damage. Check if still operational and parcels are secure.</li>
<li>If unsecured or inoperable: remove and card all items</li>
<li>Advise your supervisor ASAP</li>
<li>Scan interior barcode with PDT and indicate damage code (if barcode damaged, use exterior barcode)</li>
<li>Isolate damaged mail in your vehicle</li>
<li>Advise supervisor or Inside Depot Support when you return</li>
<li>Consult supervisor about when repairs will be done</li>
</ol>`}
]},
{cat:"Vehicle",title:"Vehicle & Loading",subs:[
{h:"Pre-Trip Inspection",content:`<ol class="steps">
<li>Go to parking lot and locate your vehicle</li>
<li>Perform a complete pre-trip inspection</li>
<li>Record mileage and date in the PDT</li>
<li>Move vehicle from parking lot to designated dock space. Back in carefully.</li>
</ol>`},
{h:"Vehicle Safety Rules",content:`<ul>
<li>No smoking or vaping in the vehicle</li>
<li>Ensure load is secure before moving</li>
<li>No electronic devices or cell phones while driving</li>
<li>Never wear headsets or headphones</li>
<li>Remove your satchel before wearing a seatbelt</li>
<li>Vehicle doors closed at all times when in motion</li>
<li>Fasten seatbelt before starting the vehicle</li>
<li>Apply parking brake and shut off engine before exiting</li>
<li>Always have your driver's licence</li>
<li>Complete pre-trip inspection every shift</li>
</ul>
<div class="danger">Under NO conditions may motorized delivery employees transport passengers.</div>`},
{h:"Loading the Ford Transit Connect",content:`<ol class="steps">
<li>Consider route terrain and volume when loading</li>
<li>Ensure you can access mail safely when parked on route</li>
<li>Stick to a consistent loading strategy every day</li>
<li>Use the header board to sequence parcels - first to deliver loaded last</li>
<li>Place carded items in LFTs behind bulkhead or VTS bottom shelf by call-for location</li>
</ol>
<h4>Layout</h4>
<table><tr><th>Position</th><th>What Goes There</th></tr>
<tr><td>A</td><td>Packet LFTs (stacked 2 high, 1 deep)</td></tr>
<tr><td>B</td><td>Sequenced mail LFTs (2 high, 2 deep)</td></tr>
<tr><td>C</td><td>Manual mail LFTs (2 high, 2 deep)</td></tr>
<tr><td>D</td><td>NM LFTs (2 high, 1 deep)</td></tr>
<tr><td>E</td><td>Floating NM/empty LFTs (on top of existing stack)</td></tr>
<tr><td>F</td><td>Small parcels (for CMBs)</td></tr>
<tr><td>G</td><td>Large/heavy parcels (loaded/unloaded at rear)</td></tr>
</table>
<div class="warn">Parcels over 22.7 kg: get assistance or use a hand cart.</div>`},
{h:"Loading the Step Van",content:`<ol class="steps">
<li>Load items on shelves front to back, first stops at front near bulkhead</li>
<li>Place carded items behind bulkhead by call-for location</li>
<li>Large heavy items on floor, sequenced in line of travel towards rear door</li>
<li>Place empty SLB tubs (SO-95s) behind bulkhead on floor</li>
<li>At each stop, shift remaining packages forward on shelves</li>
<li>Check packages as you move them forward. Plan ahead!</li>
<li>Periodically adjust and sequence parcels on floor close to rear door</li>
<li>Secure the dolly or C-45 cart</li>
</ol>
<p><b>LFT Types:</b> M = Manual Mail, S = Sequenced Mail, P = Packets, N = Neighbourhood Mail</p>`},
{h:"Loading the Ford Transit",content:`<ul>
<li><b>Manual mail (A):</b> Upper or lower shelf</li>
<li><b>Sequenced mail (B):</b> Next to manual mail, stack to comfortable height</li>
<li><b>Packets/documents (C):</b> Next to sequenced mail</li>
<li><b>NM (D):</b> Next to packets, stack to comfortable height</li>
<li><b>Additional LFTs:</b> Lower shelf or ground</li>
</ul>
<div class="warn">Always refer to the header board to determine the delivery sequence for each parcel, no matter the vehicle type.</div>`}
]},
{cat:"PDT",title:"PDT Device (CT40/CT45)",subs:[

<rect x="125" y="36" width="20" height="4" rx="1" fill="#555"/>

{h:"Health & Safety",content:`<ul>
<li>Do not use the PDT while driving. Only consult it when your vehicle is parked and in a safe location.</li>
<li>Do not stare into the scanning beam. Prolonged exposure can injure your eyes.</li>
<li>Do not leave the PDT in extreme heat (parked vehicle in summer, near a radiator).</li>
<li>If you have a pacemaker, keep at least 15cm (6 inches) between you and the PDT. Do not carry it in your breast pocket.</li>
</ul>`},
{h:"How to Scan",content:`<ol class="steps">
<li>Hold the PDT with the laser side towards the barcode, about 15 to 20 cm away</li>
<li>The barcode must be within the illuminated area</li>
<li>Press the SCAN button on the right side of the PDT</li>
</ol>
<div class="warn">Scanning is best done while standing.</div>`},

{h:"Key PDT Functions by Phase",content:`<table><tr><th>Phase</th><th>PDT Functions</th></tr>
<tr><td><b>Start of Day</b></td><td>Log in, scan NM barcodes (DCS), scan key ring check-out, record vehicle mileage</td></tr>
<tr><td><b>Before Leaving</b></td><td>Download/Confirm OFD (Out for Delivery), review parcel list, check for pickups/clearances</td></tr>
<tr><td><b>En Route</b></td><td>Scan deliveries, new stops, accept/decline on-demand pickups, SSINA notifications, capture signatures/proof of age</td></tr>
<tr><td><b>End of Day</b></td><td>NM Exceptions (overage/shortage), scan key ring check-in, vehicle check, logout, dock PDT to charger</td></tr>
</table>
<div class="warn">Always check your PDT daily before leaving the depot for customer pickup information. On-demand pickups may be added.</div>`},
{h:"SSINA & Recovery Requests",content:`<p><b>SSINA</b> (Successful Scan, Item Not Available) occurs when a customer receives delivery confirmation but cannot locate their package.</p>
<ul>
<li>Notifications appear on both At Depot and En Route screens</li>
<li>Recovery Requests initiated on <b>Day-0</b> (same day) are part of your delivery duties</li>
<li>Requests after Day-0 are handled by Customer Service</li>
</ul>
<div class="danger">SSINA can result from theft, misdelivery, or placing a parcel in the wrong compartment. Always double-check addresses.</div>`},
{h:"PDT Acronyms",content:`<p>Due to limited screen space, the PDT uses abbreviations:</p>
<table><tr><th>Acronym</th><th>Meaning</th></tr>
<tr><td>APT</td><td>Apartment</td></tr>
<tr><td>CMB</td><td>Community Mailbox</td></tr>
