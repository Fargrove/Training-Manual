<tr><td>SLB</td><td>Street Letter Box</td></tr>
<tr><td>SSINA</td><td>Successful Scan, Item Not Available</td></tr>
<tr><td>POC</td><td>Point of Call</td></tr>
<tr><td>RPO</td><td>Retail Postal Outlet</td></tr>
<tr><td>OFD</td><td>Out for Delivery</td></tr>
<tr><td>NM</td><td>Neighbourhood Mail</td></tr>
</table>`},
{h:"POCUR App Reports",content:`<p>The POCUR app on your PDT contains reports to help plan your route:</p>
<ul>
<li><b>Hazard & Warning report</b> - Dog warnings, unsafe conditions</li>
<li><b>Route Data</b> - Route details and parameters</li>
<li><b>Route Split details</b> - For OT splits</li>
<li><b>Asset Series report</b> - Equipment tracking</li>
<li><b>Delivery Accommodation report</b> - Special delivery instructions for customers</li>
<li><b>Clearance report</b> - SLB/CMB clearance schedule</li>
<li><b>Call-for Site report</b> - RPO pickup locations</li>
<li><b>Scheduled Customer Pickups</b> - Commercial pickup schedule</li>
</ul>`}
]},
{cat:"Scanning",title:"Scanning & Barcodes",subs:[
{h:"The Four Scanning Rules",content:`<p>Follow these rules in order to determine what to scan:</p>
<ol class="steps">
<li><b>Hash marks and logo:</b> Look for a barcode surrounded by hash marks and a Canada Post logo. Scan this.</li>
<li><b>Logo only:</b> No hash marks? Look for a label with the Canada Post logo. Scan this.</li>
<li><b>The RaCHEL Rule:</b> No hash marks, no logo, no NGB, but you see a 9-digit barcode or a 2-9-2 barcode starting with R, C, H, E, or L? Scan it. <b>R</b>=Registered, <b>C</b>=Parcels and Customs, <b>H</b>=Parcels, <b>E</b>=EMS, <b>L</b>=Expres.</li>
<li><b>None of the above?</b> Do not scan anything.</li>
</ol>
<div class="diagram">
<svg viewBox="0 0 600 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,sans-serif">
<rect width="600" height="580" fill="#fff"/>
<text x="300" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">The Four Scanning Rules - Visual Guide</text>
<!-- Rule 1: Hash marks + Logo -->
<rect x="15" y="40" width="570" height="120" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
<circle cx="40" cy="60" r="14" fill="#059669"/>
<text x="40" y="65" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
<text x="65" y="64" fill="#059669" font-size="13" font-weight="700">Hash Marks + Logo = SCAN</text>
<!-- Label mockup -->
<rect x="30" y="78" width="250" height="72" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
<text x="40" y="95" fill="#e00000" font-size="9" font-weight="700">CANADA POST</text>
<rect x="40" y="100" width="200" height="8" rx="1" fill="#e00000"/>
<text x="40" y="118" fill="#333" font-size="8" font-weight="600">Xpresspost</text>
<!-- Hash marks -->
<line x1="40" y1="124" x2="50" y2="124" stroke="#333" stroke-width="2"/>
<line x1="53" y1="124" x2="63" y2="124" stroke="#333" stroke-width="2"/>
<line x1="66" y1="124" x2="76" y2="124" stroke="#333" stroke-width="2"/>
<line x1="79" y1="124" x2="89" y2="124" stroke="#333" stroke-width="2"/>
<line x1="92" y1="124" x2="102" y2="124" stroke="#333" stroke-width="2"/>
<rect x="40" y="128" width="200" height="14" rx="2" fill="#333"/>
<text x="140" y="139" text-anchor="middle" fill="#fff" font-size="7">||||||||||||||||||||||||||||||||||||||||||||||</text>
<line x1="40" y1="144" x2="50" y2="144" stroke="#333" stroke-width="2"/>
<line x1="53" y1="144" x2="63" y2="144" stroke="#333" stroke-width="2"/>
<line x1="66" y1="144" x2="76" y2="144" stroke="#333" stroke-width="2"/>
<line x1="79" y1="144" x2="89" y2="144" stroke="#333" stroke-width="2"/>
<line x1="92" y1="144" x2="102" y2="144" stroke="#333" stroke-width="2"/>
<text x="300" y="98" fill="#333" font-size="11">Look for:</text>
<text x="300" y="115" fill="#333" font-size="11">- Canada Post logo at top</text>
<text x="300" y="132" fill="#333" font-size="11">- Hash marks (===) above</text>
<text x="300" y="149" fill="#333" font-size="11">  and below the barcode</text>
<!-- Rule 2: Logo Only -->
<rect x="15" y="170" width="570" height="120" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<circle cx="40" cy="190" r="14" fill="#2563eb"/>
<text x="40" y="195" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>
<text x="65" y="194" fill="#2563eb" font-size="13" font-weight="700">Logo Only (no hash marks) = SCAN</text>
<!-- Label mockup -->
<rect x="30" y="208" width="250" height="72" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
<text x="40" y="225" fill="#e00000" font-size="9" font-weight="700">CANADA POST</text>
<text x="40" y="240" fill="#333" font-size="8">Collect Customs / Percevoir douanes</text>
<text x="40" y="255" fill="#333" font-size="8">CU 451 123 783 CA</text>
<rect x="40" y="260" width="160" height="12" rx="2" fill="#333"/>
<text x="120" y="269" text-anchor="middle" fill="#fff" font-size="6">||||||||||||||||||||||||||||||||||</text>
<text x="300" y="230" fill="#333" font-size="11">Look for:</text>
<text x="300" y="247" fill="#333" font-size="11">- Canada Post logo present</text>
<text x="300" y="264" fill="#333" font-size="11">- NO hash marks around barcode</text>
<!-- Rule 3: RaCHEL -->
<rect x="15" y="300" width="570" height="185" rx="6" fill="#fef3cd" stroke="#f59e0b" stroke-width="1.5"/>
<circle cx="40" cy="320" r="14" fill="#f59e0b"/>
<text x="40" y="325" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
<text x="65" y="324" fill="#a16207" font-size="13" font-weight="700">RaCHEL Rule = SCAN</text>
<text x="30" y="348" fill="#333" font-size="11">No hash marks, no logo, no NGB, but a 2-9-2 barcode starting with:</text>
<!-- R -->
<circle cx="50" cy="375" r="14" fill="#e00000"/>
<text x="50" y="380" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">R</text>
<text x="72" y="380" fill="#333" font-size="11">= Registered</text>
<text x="180" y="380" fill="#555" font-size="9">e.g. RX 123 456 789 CN</text>
<!-- C -->
<circle cx="50" cy="405" r="14" fill="#e00000"/>
<text x="50" y="410" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">C</text>
<text x="72" y="410" fill="#333" font-size="11">= Parcels and Customs</text>
<text x="220" y="410" fill="#555" font-size="9">e.g. CH 123 456 789 KR</text>
<!-- H -->
<circle cx="50" cy="435" r="14" fill="#e00000"/>
<text x="50" y="440" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">H</text>
<text x="72" y="440" fill="#333" font-size="11">= Parcels</text>
<text x="150" y="440" fill="#555" font-size="9">e.g. HL 123 456 789 US</text>
<!-- E -->
<circle cx="320" cy="375" r="14" fill="#e00000"/>
<text x="320" y="380" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">E</text>
<text x="342" y="380" fill="#333" font-size="11">= EMS</text>
<text x="400" y="380" fill="#555" font-size="9">e.g. EP 123 456 789 FR</text>
<!-- L -->
<circle cx="320" cy="405" r="14" fill="#e00000"/>
<text x="320" y="410" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">L</text>
<text x="342" y="410" fill="#333" font-size="11">= Expres</text>
<text x="410" y="410" fill="#555" font-size="9">e.g. LZ 123 456 789 CN</text>
<text x="30" y="470" fill="#a16207" font-size="11" font-weight="600">Remember: RaCHEL = scan all labels with 2-9-2 barcodes starting with R, C, H, E, or L</text>
<!-- Rule 4: None -->
<rect x="15" y="495" width="570" height="70" rx="6" fill="#fef2f2" stroke="#e00000" stroke-width="1.5"/>
<circle cx="40" cy="520" r="14" fill="#e00000"/>
<text x="40" y="525" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

{h:"Handling Damaged Labels",content:`<p>When a label is damaged, smudged, or placed incorrectly:</p>
<ul>
<li><b>If partially readable:</b> Manually enter the barcode digits into your PDT</li>
<li><b>If completely unreadable:</b> Bring the item to your supervisor</li>
</ul>
<div class="warn">Never skip scanning an item because of a damaged label. Manual entry keeps tracking accurate.</div>`},
{h:"Delivery Labels Journey",content:`<p>Every piece of mail receives 5 key scans:</p>
<table><tr><th>#</th><th>Scan</th><th>When</th></tr>
<tr><td>1</td><td>Induction</td><td>When Canada Post first receives the mail</td></tr>
<tr><td>2</td><td>In Process</td><td>During automated sorting</td></tr>
<tr><td>3</td><td>Depot Sortation</td><td>When mail reaches the local depot</td></tr>
<tr><td>4</td><td>Out for Delivery</td><td>Just before the item leaves for its final stop</td></tr>
<tr><td>5</td><td>Delivery</td><td>When delivered (or if delivery fails)</td></tr>
</table>`},

{cat:"Pickups",title:"Pickups & Clearances",subs:[
{h:"Scheduled Pickup",content:`<ol class="steps">
<li>Check your PDT for pickup instructions</li>
<li>If unsure about volume, bring a dolly just in case</li>
<li>At the customer's location, select them from the pickup list on your PDT</li>
<li>Select the appropriate label option on your PDT</li>
<li>Scan the labels or manifest as required</li>
<li>Load your vehicle, keeping pickups separate from outgoing deliveries</li>
</ol>
<div class="warn">Always begin pickups at or after the scheduled start time. Arriving early may inconvenience the customer.</div>`},
{h:"On-Demand Pickup",content:`<p>Commercial customers can request unscheduled pickups (mainly parcels, sometimes Lettermail). You receive the request on your PDT and must accept or decline.</p>
<h4>Reasons to Decline</h4>
<ul>
<li>Not in my area</li>
<li>Vehicle disabled</li>
<li>Unable to reach before business close</li>
<li>No room in my truck</li>
<li>On break</li>
</ul>
<p>If you decline and no one else is available, you may need to return to the depot to unload and go back for the pickup. Always communicate with the dispatcher.</p>`},
{h:"Clearing an RPO",content:`<ol class="steps">
<li>Lock your vehicle, then go into the RPO with the equipment you need</li>
<li>Place mail containers and parcels on the dolly. Keep types separate per local guidelines.</li>
<li>Collect mail from indoor and outdoor receptacles, plus any containers/parcels from Retail staff</li>
<li>Scan the RPO's barcode with your PDT</li>
<li>Separate damaged mail into designated container. Unload vehicle before finishing your route.</li>
</ol>`},
{h:"Clearing SLBs",content:`<p>You are responsible for clearing Street Letter Boxes on your route.</p>
<ol class="steps">
<li>Wear puncture-resistant gloves</li>
<li>Open the door and look inside to check for safety hazards</li>
<li>Place any suspicious-looking materials in a separate container</li>
<li>Note the SLB location and any hazardous/suspicious items found</li>
</ol>
<div class="danger">Do not handle dangerous goods. Contact your supervisor immediately.</div>
<div class="warn">You must always clear SLBs and capture that on the PDT, even if there is no outgoing mail.</div>`},
{h:"Shipping Documents",content:`<p>Four types you may encounter at pickups:</p>
<table><tr><th>Type</th><th>Notes</th></tr>
<tr><td>Bill of Lading (BOL)</td><td>Accompanies each shipment. May require signature.</td></tr>
<tr><td>Prepaid label</td><td>Pre-purchased shipping label</td></tr>
<tr><td>Manifest</td><td>Lists multiple items in a shipment. "MANIFEST NOT REQ" means paperless (online).</td></tr>
<tr><td>EST-generated label</td><td>Electronic shipping tool label</td></tr>
</table>
<div class="warn">If 50+ items on a manifest, you can "eye ball" the count instead of scanning every barcode.</div>`}
]},
{cat:"Safety",title:"Safety",subs:[
{h:"Inside Hazards",content:`<p>Two types: <b>Environmental</b> (building conditions, spills, poor lighting) and <b>Behavioural</b> (rushing, not paying attention, improper lifting).</p>
<p>Three things for a safe work environment: <b>Be prepared, Pay attention, Report hazards.</b></p>
<div class="danger">"Make it safe, make it home." Everyone is responsible for safety.</div>`},
{h:"Outside Hazards",content:`<p>Your safety is the top priority. If something doesn't feel right, make the call:</p>
<ol class="steps">
<li>Pause the task</li>
<li>Bundle and endorse the mail</li>
<li>Report the hazard</li>
<li>Continue with remaining deliveries</li>
<li>Inform your team leader of the missed delivery when you return</li>
</ol>`},
{h:"Dog Bite Prevention",content:`<h4>Before Leaving Depot</h4>
<ul>
<li>Review Hazards & Warnings report on PDT (POCUR app > Reports)</li>
<li>Always take dog repellent or air horn, even if no warnings on the report</li>
</ul>
<h4>Avoid These Actions</h4>
<ul>
<li>Don't ignore barking</li>
<li>Don't sneak up on a dog</li>
<li>Don't deliver before ensuring the dog is secure</li>
<li>Don't attempt delivery with a loose dog present</li>
<li>Don't hand out dog treats</li>
</ul>
<div class="danger">If there's even a hint of a threat, don't attempt delivery.</div>
<h4>During a Dog Attack</h4>
<table><tr><th>Don't</th><th>Do</th></tr>
<tr><td>Run</td><td>Place mail in front of you as barrier</td></tr>
<tr><td>Turn your back</td><td>Use dog repellent spray or air horn</td></tr>
<tr><td>Look the dog in the eyes</td><td>Stay on your feet if attacked</td></tr>
<tr><td>Kick the dog</td><td>Back away slowly</td></tr>
</table>
<h4>After an Incident</h4>
<table><tr><th>On Site</th><th>Back at Depot</th></tr>
<tr><td>Disinfect & cover wound</td><td>Log incident in POCUR app on PDT</td></tr>
<tr><td>Contact your supervisor</td><td>Complete Dog Attack Action Checklist with supervisor</td></tr>
<tr><td>Seek immediate medical care</td><td>Request replacement repellent/air horn</td></tr>
</table>`},
{h:"Key Safety",content:`<p>Keys must always be on a CPC-issued key ring, key tag, and lanyard, attached to your person by belt clip, belt loop, or parka D-ring.</p>
<ul>
<li>Never loan keys to coworkers</li>
<li>Never leave keys in your car (even locked trunk)</li>
<li>Always lock your vehicle when leaving it</li>
</ul>
<h4>If Keys Are Lost</h4>
<p>Contact your team leader immediately with: location of loss, how it happened, whether keys were attached, whether they had a return tag.</p>
<h4>If Confronted for Keys</h4>
<ul>
<li>Stay calm, don't risk your safety</li>
<li>Listen and follow instructions</li>
<li>Say out loud that you're following their instructions while placing your hand on the keys</li>
<li>Do not chase the person. Your safety is the priority.</li>
<li>When safe, call 911, then call your team leader</li>
<li>Write down details while fresh in your memory</li>
</ul>`},
{h:"Cold Weather",content:`<ul>
<li>Check weather and wind chill before work</li>
<li>Wear water-resistant parka, wind-resistant pants, thermal base layer</li>
<li>Boots: "one snowflake" rating or better on Rate My Treads, waterproof</li>
<li>Anti-slip devices: always have them, wear on ice, remove before going indoors or driving</li>
<li>Stay hydrated with warm, caffeine-free drinks</li>
<li>Know warm-up locations along your route</li>
</ul>
<table><tr><th>Frostbite Signs</th><th>Hypothermia Signs</th></tr>
<tr><td>Numbness, white areas on face/extremities</td><td>Confusion, slurred speech, stiff muscles, uncontrollable shivering</td></tr>
<tr><td>Seek shelter, contact team leader</td><td>Seek shelter, call 911, contact team leader</td></tr>
</table>`},
{h:"Warm Weather",content:`<ul>
<li>Wear loose-fitting, breathable clothing with wicking inner layer</li>
<li>Apply water-resistant sunscreen, wear a hat</li>
<li>Drink 1 cup of cool water every 20 minutes</li>
<li>Avoid caffeine (coffee, tea, soda, energy drinks)</li>
<li>Avoid rushing, pace yourself</li>
<li>Humidex 40-45C: expect significant discomfort. 46C+: serious heat stroke risk.</li>
<li>Watch for: severe sunburn, heat rash, cramps, dizziness, fainting, heat exhaustion</li>
</ul>`},
{h:"Year Round Gear Checklist",content:`<table><tr><th>Equipment</th><th>Notes</th></tr>
<tr><td>Dual satchel</td><td>Max load 15.9 kg (35 lb)</td></tr>
<tr><td>Head lamp</td><td>For outdoors at night or poorly lit areas</td></tr>
<tr><td>Keys</td><td>Secured to CPC lanyard/belt clip/D-ring at all times</td></tr>
<tr><td>PDT</td><td>Fully charged, secured, lock screen when not using. Dial 911 for emergencies.</td></tr>
<tr><td>Puncture-resistant gloves</td><td>Request from team leader. Wear when clearing SLBs.</td></tr>
<tr><td>Dog repellent/air horn</td><td>Carry in holster, stored upright in cool dry place. Only CPC-approved brands.</td></tr>
<tr><td>High-visibility vest</td><td>Wear zipped up at all times (depot and route)</td></tr>
<tr><td>Rain gear</td><td>Rain protection gear, GORE-TEX</td></tr>
<tr><td>Emergency medication</td><td>Epi-pen, asthma inhaler if needed</td></tr>
</table>`}
]},
{cat:"End of Day",title:"End of Day Procedures",subs:[
{h:"End-of-Day Duties",content:`<ol class="steps">
<li>Check fuel gauge. If half or less, refuel before returning.</li>
<li>Unload all mail collected on route into designated containers at the dock</li>
<li>Park your vehicle in the assigned space</li>
<li>Return your corporate keys and other items including PDT</li>
<li>Prepare the next day's Neighbourhood Mail</li>
</ol>
<h4>Also Remember</h4>
<ul>
<li>Add NM overages/shortages into PDT (NM Exceptions)</li>
<li>Return shipping documents</li>
<li>Dock the PDT to its charging cradle</li>
<li>Return all undeliverable, defective, and damaged mail</li>
<li>Return mis-sequenced mail (sequenced depots)</li>
<li>Ensure your vehicle is completely empty of all mail and equipment including DNCs</li>
</ul>`},
{h:"PDT End of Day",content:`<ol class="steps">
<li>Back into the dock safely to unload</li>
<li>Collect your consolidation cart to transport items</li>
<li>Scan your key tags and return keys to the appropriate area</li>
<li>Record NM Exceptions (scan DCS blue barcode, select Overage/Shortage, enter count)</li>
<li>Confirm vehicle check is completed, select LOGOUT</li>
<li>Attach PDT to charging cradle and verify it's charging before leaving</li>
</ol>`}
]},
{cat:"Customer",title:"Customer Service & Payments",subs:[
{h:"Collecting Payment",content:`<h4>Accepted Payment Methods</h4>
<table><tr><th>Method</th><th>Details</th></tr>
<tr><td>Credit/prepaid card</td><td>VISA, MasterCard, or American Express only. Record card number, expiry, CVV, and customer name on PDT. Verify card is valid and not expired. Signature must match name on card.</td></tr>
<tr><td>CPC commercial account</td><td>For business customers</td></tr>
<tr><td>Proof of Payment (prepaid online)</td><td>PDT shows $0.00 owing. Customer can provide Proof of Payment number if amount still shows.</td></tr>
</table>
<div class="danger">Customers CANNOT pay with: cash, business cheques, personal cheques, money order, or debit card. If they want to use these, provide a DNC and explain they must pay at the RPO.</div>
<p><b>One payment method per item.</b> Different items can use different methods.</p>
<div class="warn">When using an IDB, you cannot accept credit cards. Customer without commercial account or online prepayment must be carded.</div>`},
{h:"Customs Appeal",content:`<p>If a customer disagrees with the Customs Postal Import fee:</p>
<ul>
<li>Let them know they can appeal</li>
<li>Explain that Canada Post will return the item to Customs as "Appealed"</li>
<li>CBSA (Canada Border Services Agency) will follow up directly with the customer</li>
</ul>
<div class="danger">If the customer refuses to pay, do NOT deliver the item. Suggest they appeal the fees.</div>`},
{h:"Tax-Exempt Customers",content:`<p>Customers with tax-exempt status must still pay the customs fee at delivery. They can obtain a refund by contacting CBSA (back of Form E14).</p>`},
{h:"SSINA & Recovery Requests",content:`<p><b>SSINA</b> (Successful Scan, Item Not Available) = customer got a delivery confirmation but can't find the package. May be caused by theft or wrong compartment.</p>
<p><b>Recovery Requests:</b> Initiated on Day-0 (same day as your route). You'll get a notification on PDT. Return to the delivery address, recover the item, perform recovery steps on PDT, then re-scan only when about to deliver to the correct address.</p>
<p>Requests after Day-0 are handled by Customer Service, not you.</p>`}
]},
{cat:"Equipment",title:"Equipment & Containers",subs:[
{h:"Letterflatainer (LFT)",content:`<p>Grey containers found in every depot. Used to transport Standard (STD) Lettermail and Oversize mail.</p>
<h4>Full LFTs (Stacking)</h4>
<p>Turn inner flaps DOWN, then stack one on top of another.</p>
<h4>Empty LFTs (Nesting)</h4>
<p>Flip inner flaps UP, then place one inside the other.</p>
<h4>Reminders</h4>
<ul>
<li>Don't overfill (causes health issues from weight)</li>
<li>Remove damaged LFTs from the work area</li>
<li>Lift with both hands in the handle grooves, using safe technique</li>
<li>Discard route cards after each use (garbage can, not floor)</li>
</ul>`},
{h:"SO-95 Container",content:`<p>Found in Street Letter Boxes (SLBs) and RPOs. Used to gather customer-posted mail.</p>
<ul>
<li>Max stack: 3 SO-95s on top of each other</li>
<li>Test weight before lifting. If too heavy, remove some mail.</li>
<li>Keep load close to body when carrying</li>
<li>Avoid carrying multiple containers at once</li>
</ul>`},
{h:"Other Equipment",content:`<table><tr><th>Equipment</th><th>Description</th></tr>
<tr><td>C-48</td><td>Depot-only. Transport containers around depot. Also used as extra work surface for sorting NM.</td></tr>
<tr><td>Depot cart</td><td>Assigned to a route. Holds and transports mail/parcels to delivery vehicles.</td></tr>
<tr><td>Monos</td><td>Large containers for plant-to-depot transport. Moved by hand jacks. You won't move these.</td></tr>
<tr><td>IDCs</td><td>Large wheeled containers for plant-to-depot transport. You won't use these often.</td></tr>
<tr><td>Flatbed dolly (C-8)</td><td>Transport larger items like parcels and tubs</td></tr>
<tr><td>Rolling rack (A-59)</td><td>Transport mail containers around the depot</td></tr>
<tr><td>Packet tub</td><td>Internal depot use only. Never taken on route. Too heavy/awkward for transport.</td></tr>
</table>`},
{h:"Letter Carrier Cart (C-46)",content:`<h4>Loading</h4>
<ul>
<li>Lock cart in position before loading a satchel</li>
<li>Only place a single satchel on the platform</li>
<li>Secure satchel by sliding metal rings over cart hooks</li>
<li>When loading/unloading from vehicle: detach satchel, use safe lifting, lay cart flat</li>
</ul>
<h4>Using the Cart</h4>
<ul>
<li>Hold the handle to maintain control</li>
<li>Don't retrieve mail while cart is in motion</li>
<li>Use ramps, elevators, automatic door openers</li>
<li>Avoid flights of more than 4 stairs</li>
<li>Watch for cracks and uneven surfaces</li>
<li>On a city bus: sit near the front, don't block the aisle, keep one hand on cart</li>
</ul>
<table><tr><th>Going Up Curbs/Steps</th><th>Going Down Curbs/Steps</th></tr>
<tr><td>Wheels touching the curb, face the cart, bend knees, pull up using handle</td><td>Cart facing stairs at edge, bend knees, use handle to carefully roll over edge</td></tr>
</table>
<table><tr><th>Pulling (Uphill)</th><th>Pushing (Downhill)</th></tr>
<tr><td>Cart behind you, handle high enough to avoid foot contact</td><td>Cart in front, handle at elbow height, arm relaxed at side</td></tr>
</table>`},
{h:"Dual Satchel",content:`<p>Max load: <b>15.9 kg (35 lb)</b>. First-time adjustment: get help, loosen all straps, unclip all buckles, load with no more than 25 lbs of mail.</p>
<p>Purpose: stabilize the load, transfer weight from shoulders to lower body, maintain good posture.</p>`}
]},
{cat:"Postal Codes",title:"Postal Codes",subs:[
{h:"Structure",content:`<p>Format: <b>A1A 1A1</b> (Letter-Number-Letter Number-Letter-Number)</p>
<table><tr><th>Part</th><th>Name</th><th>What It Identifies</th></tr>
<tr><td>First 3 characters</td><td>FSA (Forward Sortation Area)</td><td>Geographic area. 1st letter = province/region (18 areas). 2nd character: 0 = rural, 1-9 = urban. 3rd character further subdivides the area.</td></tr>
<tr><td>Last 3 characters</td><td>LDU (Local Delivery Unit)</td><td>Specific POC or set of POCs. When a row of POCs share an LDU, it's called a block face.</td></tr>
</table>
<p>Ontario has 5 postal districts, Quebec has 3, due to dense population.</p>`}
]},
{cat:"Forwarding",title:"Mail Forwarding & RTS",subs:[
{h:"Redirection Case Cards",content:`<p><b>Orange</b> redirection case cards identify mail to be forwarded due to change of address. Card shows:</p>
<ul>
<li>Original/Amendment, Comments, Names, Original address, New address</li>
<li>Local or Forward, New/Old route numbers</li>
<li>Permanent or Temporary, R (Residential) or B (Business)</li>
<li>Forward start and end dates</li>
</ul>
<h4>A and B Cards</h4>
<p>In depots without a Redirection Service clerk: A card goes with the forwarded mail, B card replaces it in the case.</p>
<h4>Expiration</h4>
<p>Remove case cards from the separation on the first working day AFTER the expiry date.</p>`},
{h:"What Forwarded Mail Looks Like",content:`<ul>
<li><b>Yellow label:</b> Forwarded at a Redirection Service site within a depot. New address printed on yellow label.</li>
<li><b>Chevron markings:</b> Forwarded by sortation machines. Shows REDIRECTION/REEXPEDITION stamp and new address in lower right corner with chevron markings.</li>
</ul>
<div class="warn">If mail looks like a missort but has chevron markings, deliver to the NEW address beside the chevrons.</div>`},
{h:"Other Redirection Rules",content:`<table><tr><th>Type</th><th>Rule</th></tr>
<tr><td>Personalized Mail ("Occupant"/"Current Resident")</td><td>Do NOT redirect. Deliver as addressed. Exception: redirect if it has Return Postage Guaranteed (RPG) endorsement.</td></tr>
<tr><td>Mail with "Do Not Forward"</td><td>Do not forward. Return to Sender (RTS).</td></tr>
<tr><td>Parcels/PCIs</td><td>Can only redirect if new address is within Canada. If outside Canada, don't redirect.</td></tr>
<tr><td>Proof of Age label</td><td>Do not forward. Return to sender.</td></tr>
<tr><td>Forwarding address outside Canada</td><td>Do not forward. Return to sender.</td></tr>
</table>`},
{h:"Return to Sender (RTS) Reasons",content:`<table><tr><th>Reason</th><th>When to Use</th></tr>
<tr><td>Unclaimed</td><td>Item unclaimed after being carded</td></tr>
<tr><td>No such address</td><td>Street, civic number, or unit doesn't exist</td></tr>
<tr><td>Address incomplete</td><td>Vital address elements missing</td></tr>
<tr><td>Moved/Unknown</td><td>Addressee moved without redirect, or redirect expired</td></tr>
<tr><td>No such Post Office</td><td>PO doesn't exist and no return address</td></tr>
<tr><td>Refused</td><td>Addressee refused the item</td></tr>
</table>
<h4>Special RTS Rules</h4>
<table><tr><th>Mail Type</th><th>Rule</th></tr>
<tr><td>Lettermail (unknown/deceased/moved)</td><td>Do NOT write reason on the lettermail</td></tr>
<tr><td>Lettermail (other reasons)</td><td>You CAN write the reason</td></tr>
<tr><td>Publications</td><td>Do not write the reason</td></tr>
<tr><td>Philatelic/First Day Covers</td><td>Do not write on them</td></tr>
<tr><td>Literature for the Blind</td><td>Write reason on the address label, not on plastic covering</td></tr>
<tr><td>Personalized Mail with Return Postage</td><td>Do not write the reason</td></tr>
</table>
<div class="warn">Make every reasonable effort to deliver mail before returning it to sender.</div>
<h4>Undeliverable Mail</h4>
<p>If an item can't be delivered, has no return address, or isn't eligible for RTS:</p>
<ol class="steps">
<li>Cross out the customer's name and address</li>
<li>Indicate the reason it can't be delivered</li>
<li>Deposit in the designated Undeliverable Mail area</li>
</ol>`}
]},
{cat:"Case Cards",title:"Case Cards",subs:[
{h:"Hold Mail (Yellow Card)",content:`<p>A yellow Hold Mail case card means: do not deliver mail to this address for the indicated period.</p>
<h4>Card Fields</h4>
<ul>
<li>Original or Amendment</li>
<li>Comments</li>
<li>Names of addressees</li>
<li>Customer's address</li>
<li>Hold Mail case separation number</li>
<li>Route number</li>
<li>Service start and end dates</li>
<li>Residential (R) or Business (B)</li>
</ul>
<h4>Holding PCIs and Parcels</h4>
<table><tr><th>Barcoded Items (not parcels)</th><th>Parcels</th></tr>
<tr><td>Can be held</td><td>Excluded from Hold Mail. Must be treated as RTS.</td></tr>
</table>`},
{h:"Quarantine Case Card (Yellow)",content:`<p>When a potentially fraudulent Hold Mail request is under investigation, you receive a yellow Quarantine card. Process all mail for that address as Hold Mail until the investigation is complete.</p>`},
{h:"Directs and Callers",content:`<table><tr><th>Directs</th><th>Callers</th></tr>
<tr><td>Mail delivered by a motorized employee to a customer who receives large volumes</td><td>Customer who picks up large-volume mail at the depot instead of receiving delivery</td></tr>
<tr><td>May be prepared by one employee and delivered by another</td><td>Employee prepares the mail and places it in a designated pickup area</td></tr>
</table>`},
{h:"Missorts",content:`<table><tr><th>Type</th><th>Description</th><th>What to Do</th></tr>
<tr><td>Missorted in-depot</td><td>Correct depot but wrong route</td><td>Sequenced/SSD depot: put on case ledge or in missort separation. Non-sequenced: put in missorts rack.</td></tr>
<tr><td>Missorted out-of-depot</td><td>Wrong depot entirely</td><td>Same as above - it will be routed to the correct depot.</td></tr>
</table>`}
]},
{cat:"Depot",title:"Depot Types & Layout",subs:[
{h:"Sequenced Depot",content:`<p>A large portion of Standard Lettermail (STD) is machine-sorted into delivery sequence (route line of travel). Floor plan layout is standardized. Has Wave 1 and Wave 2 areas for sequenced STD and parcels.</p>`},
{h:"Non-Sequenced Depot",content:`<p>Layout and equipment can vary. Familiarize yourself with what is consistent from depot to depot: types of mail and equipment.</p>`},
{h:"Separate Sort from Delivery (SSD)",content:`<p>In SSD depots, the traditional letter carrier role is split:</p>
<ul>
<li><b>Routers:</b> Obtain, sort, and prepare manual mail for delivery using one A-62 case for multiple routes. Mail is delivered the next day.</li>
<li><b>Delivery Employees:</b> Only responsible for delivering the already-sorted mail.</li>
</ul>
<div class="warn">In SSD depots, delivery employees will not have access to Hold or Mail Forwarding case cards. Routers primarily sort, but can be required to help with delivery. Every delivery employee can be required to deliver.</div>`}
]},
{cat:"Delivery Method",title:"Back-to-Back Delivery Method",subs:[
{h:"What Is It?",content:`<p>A mail-handling method used in sequenced depots. You hold manually sorted mail facing up toward you and sequenced mail facing the opposite direction, combined in one hand.</p>`},
{h:"Steps",content:`<ol class="steps">
<li>Obtain a bundle from the satchel, hold in your preferred carrying hand</li>
<li>Remove the elastics from around the combined bundle with your other hand</li>
<li>Place both bundles onto your forearm</li>
<li>Take the sequenced bundle and place it upside-down in your carrying hand with address facing away</li>
<li>Remove remaining elastic from manual bundle, move manual mail down in front of sequenced mail (straight transfer from forearm to hand). Addresses will be in opposite directions.</li>
<li>To see sequenced mail, pivot or rotate your carrying hand, resting bundle on forearm</li>
<li>Obtain required mail for the POC with your other hand</li>
<li>Reverse the bundle to obtain manual mail for that POC</li>
<li>Hold and deliver with your other hand</li>
<li>Grab corresponding NM for that POC</li>
</ol>`}
]},
{cat:"Basic Rules",title:"Basic Delivery Guidelines",subs:[
{h:"12 Rules of Delivery",content:`<ol class="steps">
<li>Always follow the route as designed</li>
<li>Never take shortcuts</li>
<li>Verify the entire address</li>
<li>Respect customer requests</li>
<li>Only deliver to approved locations</li>
<li>Follow the DNC process</li>
<li>Always be courteous when delivering</li>
<li>Have damaged mail repaired before delivering</li>
<li>Don't give mail to children or unauthorized people</li>
<li>Do not open mail addressed to someone else</li>
<li>Don't nest Neighbourhood Mail inside other pieces</li>
<li>Dispose of waste properly and return rubber bands to the depot</li>
</ol>`},
{h:"Full Mail Receptacles",content:`<ul>
<li>If full and mail won't fit: bundle the mail and return it to the depot</li>
<li>Notify your supervisor (they'll contact the customer)</li>
<li>Never remove mail from a receptacle once delivered</li>
<li>Delivered mail is the property of the recipient</li>
</ul>`},
{h:"Dropped Mail in Mailroom",content:`<p>Pick up mail tossed on the floor. Place a small <b>X</b> on the back of each envelope and re-sort into proper slots. The X identifies repeat offenders who may be trying to refuse or return mail.</p>
<div class="warn">Always remove mail from the outgoing compartment of a CMB and scan the barcode, even if no mail to deliver. Always clear SLBs and capture on PDT, even with no outgoing mail.</div>`},
{h:"When Delivering Barcoded Items",content:`<p>Always verify:</p>
<ul>
<li>Is a <b>Signature</b> required?</li>
<li>Is there a <b>Customs amount due</b>?</li>
<li>Does the <b>ATTENTION box</b> contain delivery instructions?</li>
</ul>`}
]}
];

const cats=new Set(DATA.map(d=>d.cat));
const catsEl=document.getElementById('cats');
const contentEl=document.getElementById('content');
const searchEl=document.getElementById('search');
const clearBtn=document.getElementById('clearBtn');
const backTop=document.getElementById('backTop');
let activeCat=null;
let searchMode=false;

function renderCats(){
catsEl.innerHTML='<button class="cat-btn'+(activeCat===null?' active':'')+'" onclick="filterCat(null)">All</button>';
cats.forEach(c=>{
catsEl.innerHTML+=`<button class="cat-btn${activeCat===c?' active':''}" onclick="filterCat('${c}')">${c}</button>`;
});
}

function filterCat(c){
activeCat=c;
searchEl.value='';
clearBtn.style.display='none';
searchMode=false;
renderCats();
renderContent();
window.scrollTo({top:0});
}

function clearSearch(){
searchEl.value='';
clearBtn.style.display='none';
searchMode=false;
renderContent();
searchEl.focus();
}

function stripHtml(html){
const tmp=document.createElement('div');
tmp.innerHTML=html;
return tmp.textContent||tmp.innerText||'';
}

function extractPassage(html,query,maxLen){
maxLen=maxLen||220;
const text=stripHtml(html);
const q=query.toLowerCase();
const idx=text.toLowerCase().indexOf(q);
if(idx===-1) return null;
let start=Math.max(0,idx-80);
let end=Math.min(text.length,idx+query.length+maxLen-80);
if(start>0){
const sp=text.indexOf(' ',start);
if(sp!==-1&&sp<start+15) start=sp+1;
}
if(end<text.length){
const sp=text.lastIndexOf(' ',end);
if(sp>idx+query.length) end=sp;
}
let passage=(start>0?'...':'')+text.slice(start,end)+(end<text.length?'...':'');
return passage;
}

function scoreResult(d,s,query){
const q=query.toLowerCase();
const words=q.split(/\s+/).filter(w=>w.length>1);
let score=0;
const titleL=d.title.toLowerCase();
const headL=s.h.toLowerCase();
const bodyText=stripHtml(s.content).toLowerCase();
if(headL===q) score+=100;
else if(headL.includes(q)) score+=60;
if(titleL.includes(q)) score+=30;
words.forEach(w=>{
if(headL.includes(w)) score+=20;
if(titleL.includes(w)) score+=10;
});
const bodyMatches=(bodyText.match(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'))||[]).length;
score+=Math.min(bodyMatches*8,40);
words.forEach(w=>{
const wm=(bodyText.match(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'))||[]).length;
score+=Math.min(wm*3,15);
});
if(bodyText.length<300) score+=5;
return score;
}

function highlightText(text,query){
const words=query.split(/\s+/).filter(w=>w.length>1);
const escaped=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
let result=text.replace(new RegExp('('+escaped+')','gi'),'<mark>$1</mark>');
words.forEach(w=>{
if(w.toLowerCase()!==query.toLowerCase()){
const we=w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
result=result.replace(new RegExp('('+we+')','gi'),'<mark>$1</mark>');
}
});
return result;
}

function jumpToSection(dataIdx,subIdx){
searchEl.value='';
clearBtn.style.display='none';
searchMode=false;
activeCat=null;
renderCats();
renderContent();
const sections=contentEl.querySelectorAll('.section');
if(sections[dataIdx]){
const title=sections[dataIdx].querySelector('.section-title');
const body=sections[dataIdx].querySelector('.section-body');
if(!title.classList.contains('open')){
title.classList.add('open');
body.classList.add('show');
}
const subs=body.querySelectorAll('.sub-section');
const target=subs[subIdx]||title;
setTimeout(()=>target.scrollIntoView({behavior:'smooth',block:'start'}),50);
}
}

function renderSearchResults(query){
const q=query.toLowerCase();
const results=[];
DATA.forEach((d,di)=>{
d.subs.forEach((s,si)=>{
const headL=s.h.toLowerCase();
const bodyText=stripHtml(s.content).toLowerCase();
const words=q.split(/\s+/).filter(w=>w.length>1);
const fullMatch=headL.includes(q)||bodyText.includes(q);
const wordMatch=words.length>1&&words.some(w=>headL.includes(w)||bodyText.includes(w));
if(!fullMatch&&!wordMatch) return;
const score=scoreResult(d,s,query);
const passage=extractPassage(s.content,query,220)||
(words.length>1?words.reduce((best,w)=>{
if(best) return best;
return extractPassage(s.content,w,220);
},null):null);
if(!passage) return;
results.push({d,s,di,si,score,passage});
});
});
results.sort((a,b)=>b.score-a.score);
if(!results.length){
contentEl.innerHTML='<div class="no-results">No results for "'+query+'"<br><br>Try different keywords or browse by category above.</div>';
return;
}
let html='';
const top=results[0];
if(top.score>=20){
const hPassage=highlightText(top.passage,query);
html+=`<div class="answer-box">
<div class="answer-label">&#x1F50D; Best match</div>
<div class="answer-passage">${hPassage}</div>
<div class="answer-source">${top.d.title} &rsaquo; ${top.s.h} &mdash; <a onclick="jumpToSection(${top.di},${top.si})">View full section</a></div>
</div>`;
}
const shown=top.score>=20?results.slice(1,11):results.slice(0,10);
if(shown.length){
html+=`<div class="result-count">${results.length} result${results.length===1?'':'s'} found</div>`;
shown.forEach(r=>{
const hPassage=highlightText(r.passage,query);
html+=`<div class="snippet" onclick="jumpToSection(${r.di},${r.si})">
<div class="snippet-title">${r.s.h}</div>
<div class="snippet-section">${r.d.title} &rsaquo; ${r.d.cat}</div>
<div class="snippet-text">${hPassage}</div>
</div>`;
});
if(results.length>10){
html+=`<div class="result-count" style="text-align:center;padding-top:8px">Showing top 10 of ${results.length} results. Try a more specific query.</div>`;
}
}
contentEl.innerHTML=html;
}

function renderContent(query){
if(query){
searchMode=true;
renderSearchResults(query);
return;
}
searchMode=false;
let filtered=DATA;
if(activeCat) filtered=filtered.filter(d=>d.cat===activeCat);
let html='';
filtered.forEach((d,i)=>{
const open=filtered.length===1?' open':'';
const show=filtered.length===1?' show':'';
let subsHtml='';
d.subs.forEach(s=>{
subsHtml+=`<div class="sub-section"><h3>${s.h}</h3>${s.content}</div>`;
});
html+=`<div class="section">
<div class="section-title${open}" onclick="toggleSection(this)">
${d.title}
<span class="arrow">&#x25B6;</span>
</div>
<div class="section-body${show}">${subsHtml}</div>
</div>`;
});
contentEl.innerHTML=html||'<div class="no-results">No matching content found.</div>';
}

function toggleSection(el){
el.classList.toggle('open');
const body=el.nextElementSibling;
body.classList.toggle('show');
}

let searchTimeout;
searchEl.addEventListener('input',function(){
clearBtn.style.display=this.value?'block':'none';
clearTimeout(searchTimeout);
searchTimeout=setTimeout(()=>{
activeCat=null;
renderCats();
renderContent(this.value.trim());
},200);
});

window.addEventListener('scroll',()=>{
backTop.style.display=window.scrollY>300?'flex':'none';
});

renderCats();
renderContent();
</script>
</body>
</html>
